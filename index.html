<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ProRadar™ 盈利导航系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0A1120; --navy2:#0E1729; --panel:#101A2E; --line:rgba(255,255,255,.07);
  --ink:#E9EEF8; --bg:#070C18; --card:#101A2E; --muted:#93A4C0; --soft:rgba(255,255,255,.06);
  --orange:#E0935A; --lime:#5FC08A; --pink:#E87FA8; --yellow:#E6C260; --sky:#5B8DEF; --teal:#3FC8C0;
  --border:rgba(255,255,255,.09); --shadow:0 14px 40px rgba(0,0,0,.45);
  --r:16px; --brand:linear-gradient(135deg,#5B8DEF,#6FD3E8);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Noto Sans SC','Sora',system-ui,sans-serif;color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased;
  background:
   radial-gradient(1100px 680px at 82% -8%, rgba(91,141,239,.14), transparent 60%),
   radial-gradient(900px 620px at -5% 110%, rgba(63,200,192,.08), transparent 55%),
   url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUAAAAFACAYAAADNkKWqAAADc0lEQVR42u3az4ocVRjG4fcMQhaZiUGCEzEGcVYqaiAQZ/BfwOsIxJUX4N47DWRhdiImM1mELF43tQlG6Q49PV3Vz7P5Nk0X/Kr61DnQycK0/T0AAAAAAAAAsDhtz1QAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAICd1/ZDFQAAAAAAAGAVbR+qAPzPGnGmAgAALGV7/6sK/Mezca3tYdtramzekAB2egE8THKU5HyMcaHIZr13yTfv/SSHSS7GGM/lhrW9TnI+TTbs4JK//zDJx9ME1j2ijfFqjHExxnilxo7vANveTHI9ycsxxt9JLpI8mybAoneA15PcmWbGGM/HGM8cf4F9WABfJvljmgAAAAAAAAAAAAAAAAAAALPR9lQFAAAAAAAAAAAAVtT2WAUAAAAAuFptv1cBAAAAAACYvbZfqwAAAAAAAAAAAADA4rT9YcXP+UMtAAAAAAAAADum7S8qAMBb3pBfqQAAAAAAACxS289UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAmJ22H6kAAAAAAAAAAAAAAAAAAAAAAACL1/ZUBQAAAAAAAAAAAAAAgLloe0sFAAAAAAAAAAAAAHZd229UAAAAAABgLW1/VmGR9/W2CgAAAAAAAAAAAAAAAAAAAMClanumwsqtHqoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAa2h7ogIAvOUNeawCAAAAzOEI/60KAAAAAADra/uJCgAAAGz2qPmFCgAAAAD/0vY3FWB+P9zHKgAAs93J3FcBAAAWtMN/pAIAAAAAAAAAAAAAafulCmzweTpRAQAAAAAAAAAAAAAAAAAAAAAAAAAAYI+MbV2o7a0kN5K8GGP8KT1w1Q62eK0bSU6mCbBXC+CLJE+mCQDALLS9qwIAAAAAAAAAzF3bH1UAAAAAAAAAAAAAAAAAAIA3tX2gAgAAAAAAAAAAACRt76oAAAAAAAAAAO+q7ecqAAAAAAAAALur7WMVAAAWvuM7VQEAAAAAAADgMrU9VgEAAIDVDQnYprYfJDlKcj7G+EsRrtKBBGzZUZJPpwkWQPbKeZKn04S9PxJ9pwIAwGY3WHdUAAAAAAAAgG1oe08FAAAAAAAAAAAAAGDvtT1TAQAAgOUddx+pAAAAAAAAAAAAAADAG9r+pAIAAAAswj8SidB5iMXpGgAAAABJRU5ErkJggg==') repeat,
   linear-gradient(180deg,#070C18,#0A1322);
  background-attachment:fixed,fixed,fixed,fixed}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.dsp{font-family:'Sora','Noto Sans SC',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}

#login{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:
   radial-gradient(1000px 560px at 50% -10%, rgba(91,141,239,.18), transparent 60%),
   url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUAAAAFACAYAAADNkKWqAAADc0lEQVR42u3az4ocVRjG4fcMQhaZiUGCEzEGcVYqaiAQZ/BfwOsIxJUX4N47DWRhdiImM1mELF43tQlG6Q49PV3Vz7P5Nk0X/Kr61DnQycK0/T0AAAAAAAAAsDhtz1QAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAICd1/ZDFQAAAAAAAGAVbR+qAPzPGnGmAgAALGV7/6sK/Mezca3tYdtramzekAB2egE8THKU5HyMcaHIZr13yTfv/SSHSS7GGM/lhrW9TnI+TTbs4JK//zDJx9ME1j2ijfFqjHExxnilxo7vANveTHI9ycsxxt9JLpI8mybAoneA15PcmWbGGM/HGM8cf4F9WABfJvljmgAAAAAAAAAAAAAAAAAAALPR9lQFAAAAAAAAAAAAVtT2WAUAAAAAuFptv1cBAAAAAACYvbZfqwAAAAAAAAAAAADA4rT9YcXP+UMtAAAAAAAAADum7S8qAMBb3pBfqQAAAAAAACxS289UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAmJ22H6kAAAAAAAAAAAAAAAAAAAAAAACL1/ZUBQAAAAAAAAAAAAAAgLloe0sFAAAAAAAAAAAAAHZd229UAAAAAABgLW1/VmGR9/W2CgAAAAAAAAAAAAAAAAAAAMClanumwsqtHqoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAa2h7ogIAvOUNeawCAAAAzOEI/60KAAAAAADra/uJCgAAAGz2qPmFCgAAAAD/0vY3FWB+P9zHKgAAs93J3FcBAAAWtMN/pAIAAAAAAAAAAAAAafulCmzweTpRAQAAAAAAAAAAAAAAAAAAAAAAAAAAYI+MbV2o7a0kN5K8GGP8KT1w1Q62eK0bSU6mCbBXC+CLJE+mCQDALLS9qwIAAAAAAAAAzF3bH1UAAAAAAAAAAAAAAAAAAIA3tX2gAgAAAAAAAAAAACRt76oAAAAAAAAAAO+q7ecqAAAAAAAAALur7WMVAAAWvuM7VQEAAAAAAADgMrU9VgEAAIDVDQnYprYfJDlKcj7G+EsRrtKBBGzZUZJPpwkWQPbKeZKn04S9PxJ9pwIAwGY3WHdUAAAAAAAAgG1oe08FAAAAAAAAAAAAAGDvtT1TAQAAgOUddx+pAAAAAAAAAAAAAADAG9r+pAIAAAAswj8SidB5iMXpGgAAAABJRU5ErkJggg==') repeat,
   linear-gradient(160deg,#070C18,#0A1322 60%,#070C18)}
.radar-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.6}
.radar-bg .ring{position:absolute;border:1px solid rgba(91,141,239,.12);border-radius:50%}
.radar-sweep{position:absolute;width:560px;height:560px;border-radius:50%;
  background:conic-gradient(from 0deg, rgba(91,141,239,.20), transparent 28%);animation:sweep 6s linear infinite}
@keyframes sweep{to{transform:rotate(360deg)}}
.login-card{position:relative;width:344px;max-width:88vw;background:rgba(16,26,46,.72);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:36px 30px 30px;text-align:center;
  box-shadow:0 30px 90px rgba(0,0,0,.55)}
.brand{display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.brand .dot{background:none;display:flex;align-items:center;justify-content:center}
.brand .dot img{height:60px;width:auto;filter:drop-shadow(0 4px 16px rgba(91,141,239,.5))}
.login-card h1{color:#fff;font-family:'Sora';font-size:24px;font-weight:800;letter-spacing:.5px}
.login-card .sub{color:#8094b5;font-size:11px;margin-top:5px;letter-spacing:4px}
.login-card .tag{color:#8FB2F5;font-size:12px;margin:14px 0 22px}
.login-card input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  color:var(--ink);padding:13px 16px;border-radius:12px;text-align:center;letter-spacing:6px;font-size:18px;outline:none}
.login-card input:focus{border-color:#5B8DEF;box-shadow:0 0 0 3px rgba(91,141,239,.18)}
.login-card button{width:100%;margin-top:16px;background:var(--brand);color:#06101F;font-weight:700;
  padding:13px;border-radius:12px;font-size:15px;font-family:'Sora'}
.login-err{color:#F2888C;font-size:12px;height:16px;margin-top:10px}

#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,rgba(12,19,36,.92),rgba(10,17,32,.96));
  border-right:1px solid var(--border);backdrop-filter:blur(10px);color:#cdd8ea;
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:60;transition:transform .25s}
.sb-head{padding:18px 18px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.sb-head .dot{background:none;display:flex;align-items:center;justify-content:center}
.sb-head .dot img{height:30px;width:auto;filter:drop-shadow(0 2px 8px rgba(91,141,239,.45))}
.sb-head .nm{font-family:'Sora';font-weight:800;color:var(--ink);font-size:16px;line-height:1}
.sb-head .nm small{display:block;font-weight:400;color:#6f82a3;font-size:10px;letter-spacing:2px;margin-top:3px}
.nav{flex:1;padding:12px;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:#9fb0cd;
  font-size:13.5px;font-weight:500;margin-bottom:3px;text-decoration:none;transition:.15s;cursor:pointer}
.nav a .ic{width:18px;text-align:center;font-size:15px}
.nav a:hover{background:var(--soft);color:var(--ink)}
.nav a.on{background:linear-gradient(135deg,rgba(91,141,239,.22),rgba(63,200,192,.10));color:var(--ink);
  box-shadow:inset 2px 0 0 #5B8DEF}
.sb-foot{padding:14px 16px;border-top:1px solid var(--line);font-size:11px;color:#6f82a3}
.sb-foot button{color:#9fb0cd;font-size:12px;padding:6px 0}
.main{flex:1;margin-left:230px;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:rgba(10,17,32,.72);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;gap:14px}
.topbar h2{font-family:'Sora';font-size:19px;font-weight:700;color:var(--ink)}
.topbar .crumb{color:var(--muted);font-size:12px}
.topbar .spacer{flex:1}
.hamb{display:none;font-size:22px;color:var(--ink)}
.sync-pill{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);
  background:var(--soft);border:1px solid var(--border);padding:7px 13px;border-radius:30px;cursor:pointer}
.sync-pill .led{width:8px;height:8px;border-radius:50%;background:#56688a}
.period-sel{background:var(--soft);border:1px solid var(--border);color:var(--ink);
  padding:7px 11px;border-radius:30px;font-size:12px;outline:none;cursor:pointer}
.period-sel:focus{border-color:#5B8DEF}
.period-sel option{background:#101A2E;color:var(--ink)}
.muted{color:var(--muted)}
.attn{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:4px}
.attn-i{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;transition:.15s}
.attn-i:hover{background:var(--soft2)}
.attn-i b{display:block;font-family:'JetBrains Mono';font-size:24px;line-height:1}
.attn-i span{display:block;font-size:11px;color:var(--muted);margin-top:5px}
@media(max-width:760px){.attn{grid-template-columns:repeat(3,1fr)}}
.seg2{display:inline-flex;background:var(--soft);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.seg2 button{padding:8px 16px;font-size:12.5px;color:var(--muted);font-weight:600}
.seg2 button.on{background:var(--brand);color:#06101F}
.thsort{cursor:pointer;user-select:none;white-space:nowrap}
.thsort:hover{color:var(--ink)}
.section-title{font-family:'Sora','Noto Sans SC',sans-serif;font-size:14px;font-weight:700;color:var(--ink);margin:18px 0 10px}
.ai-chat{display:flex;flex-direction:column;gap:12px;min-height:200px;max-height:52vh;overflow:auto;padding:6px 2px}
.ai-msg{display:flex}
.ai-msg.user{justify-content:flex-end}
.ai-msg .bubble{max-width:80%;padding:11px 14px;border-radius:14px;font-size:13.5px;line-height:1.65}
.ai-msg.user .bubble{background:var(--brand);color:#06101F;border-bottom-right-radius:4px;font-weight:500}
.ai-msg.bot .bubble{background:var(--soft);border:1px solid var(--border);color:var(--ink);border-bottom-left-radius:4px}
.ai-input{display:flex;gap:8px;margin-top:12px}
.ai-input input{flex:1;background:var(--soft);border:1px solid var(--border);color:var(--ink);padding:12px 14px;border-radius:12px;font-size:14px;outline:none}
.ai-input input:focus{border-color:#5B8DEF}
.sync-pill.live .led{background:#3FC8C0;box-shadow:0 0 0 3px rgba(63,200,192,.22)}
.content{padding:22px 26px 60px;max-width:1400px;width:100%}
.view{display:none;animation:fade .3s}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.btn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#06101F;padding:10px 16px;
  border-radius:11px;font-weight:700;font-size:13px;transition:.15s;box-shadow:0 6px 18px rgba(91,141,239,.25)}
.btn:hover{filter:brightness(1.08)}
.btn.gold{background:var(--brand);color:#06101F}
.btn.ghost{background:var(--soft);color:var(--ink);border:1px solid var(--border);box-shadow:none}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:9px}
.btn.danger{background:#E5848A;color:#1a0b0c;box-shadow:none}
.icbtn{width:32px;height:32px;border-radius:9px;background:var(--soft);color:var(--muted);
  display:inline-flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border)}
.icbtn:hover{background:var(--soft2);color:var(--ink)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi{background:var(--kpibg);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi.c1::before{background:#5B8DEF}.kpi.c2::before{background:#3FC8C0}
.kpi.c3::before{background:#E0935A}.kpi.c4::before{background:#E87FA8}
.kpi .lbl{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;font-weight:500}
.kpi .val{font-family:'JetBrains Mono';font-size:26px;font-weight:700;margin-top:8px;color:var(--ink);letter-spacing:-.5px}
.kpi .delta{font-size:11px;margin-top:5px;font-weight:600;color:var(--muted)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--cardbg);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.card h3{font-family:'Sora';font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;color:var(--ink)}
.card .csub{font-size:11.5px;color:var(--muted);margin-bottom:14px}
.card .chwrap{position:relative;height:240px}
.card .chwrap.sm{height:210px}

.tablewrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.015)}
table{width:100%;border-collapse:collapse;font-size:13px;background:transparent;color:var(--ink)}
thead th{background:var(--soft);color:var(--muted);font-weight:600;text-align:left;padding:11px 14px;
  font-size:11.5px;letter-spacing:.3px;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody td{padding:11px 14px;border-top:1px solid rgba(255,255,255,.06);white-space:nowrap}
tbody tr:hover{background:rgba(255,255,255,.035)}
td.num,th.num{text-align:right;font-family:'JetBrains Mono'}
.tag2{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:30px;font-size:11px;font-weight:600}
.tag2.vip{background:rgba(230,194,96,.16);color:#EBCB6E}
.tag2.active{background:rgba(63,200,192,.16);color:#5FD3C9}
.tag2.potential{background:rgba(91,141,239,.16);color:#8FB2F5}
.tag2.risk{background:rgba(224,147,90,.18);color:#F0A878}
.tag2.lost{background:rgba(229,132,138,.16);color:#F0989C}
.tag2.gray{background:var(--soft);color:#93A4C0}
.tag2.lo{background:rgba(229,132,138,.16);color:#F0989C}
.tag2.slow{background:rgba(230,194,96,.16);color:#EBCB6E}
.tag2.ok{background:rgba(95,192,138,.16);color:#7FD3A0}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input[type=text],.toolbar select{background:var(--soft);border:1px solid var(--border);
  color:var(--ink);padding:9px 13px;border-radius:10px;outline:none;min-width:150px}
.toolbar input::placeholder{color:#6f82a3}
.toolbar input:focus,.toolbar select:focus{border-color:#5B8DEF}
.toolbar .spacer{flex:1}
.toolbar select option{background:#101A2E;color:var(--ink)}

.section-title{font-family:'Sora';font-size:14px;font-weight:700;margin:22px 0 12px;color:var(--ink);display:flex;align-items:center;gap:8px}
.rankrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rankrow:last-child{border-bottom:none}
.rankrow .rk{width:22px;height:22px;border-radius:7px;background:var(--soft);color:var(--muted);
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rankrow .rk.g1{background:#E6C260;color:#0E1729}.rankrow .rk.g2{background:#A9B6CE;color:#0E1729}.rankrow .rk.g3{background:#C98F5E;color:#0E1729}
.rankrow .rnm{flex:1;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rankrow .rval{font-family:'JetBrains Mono';font-weight:600;font-size:12.5px;width:104px;text-align:right;color:var(--ink)}

.modal{position:fixed;inset:0;z-index:200;background:rgba(3,7,15,.7);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal.on{display:flex}
.modal-card{background:#111B30;border:1px solid var(--border);border-radius:18px;width:580px;max-width:100%;
  box-shadow:0 30px 90px rgba(0,0,0,.6);animation:pop .25s}
@keyframes pop{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-head h3{font-family:'Sora';font-size:17px;font-weight:700;flex:1;color:var(--ink)}
.modal-body{padding:22px;max-height:64vh;overflow-y:auto}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--soft);border:1px solid var(--border);
  color:var(--ink);padding:10px 12px;border-radius:10px;outline:none}
.field input:focus,.field select:focus{border-color:#5B8DEF}
.field select option{background:#111B30;color:var(--ink)}
.field details summary{color:var(--muted)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.lineitem{display:grid;grid-template-columns:2.2fr .8fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.lineitem input,.lineitem select{padding:8px 10px}
.order-sum{background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px;display:flex;justify-content:space-around;text-align:center}
.order-sum div span{display:block;font-size:11px;color:var(--muted)}
.order-sum div b{font-family:'JetBrains Mono';font-size:17px;color:var(--ink)}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:10px;opacity:.4}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;
  background:#1b2740;border:1px solid var(--border);color:#fff;padding:12px 22px;border-radius:30px;font-size:13px;font-weight:500;
  box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transition:.3s}
.toast.show{transform:translateX(-50%);opacity:1}
.note{background:rgba(91,141,239,.12);border:1px solid rgba(91,141,239,.28);border-radius:12px;padding:14px 16px;
  font-size:12.5px;color:#cfe0ff;margin-bottom:16px;line-height:1.6}
.note code{background:var(--soft2);padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono';font-size:11.5px;color:#bcd2ff}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:16px;flex-wrap:wrap}
.setrow:last-child{border-bottom:none}
.setrow .l b{display:block;font-size:13.5px;font-weight:600;color:var(--ink)}
.setrow .l span{font-size:12px;color:var(--muted)}
.setrow input{background:var(--soft);border:1px solid var(--border);color:var(--ink)}
.switch{width:46px;height:26px;border-radius:30px;background:rgba(255,255,255,.14);position:relative;transition:.2s;flex-shrink:0;cursor:pointer}
.switch.on{background:#3FC8C0}
.switch i{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on i{left:23px}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:5px 8px 5px 11px;border-radius:30px;font-size:12px;color:var(--ink)}
.chip button{background:var(--soft2);color:var(--muted);width:18px;height:18px;border-radius:50%;font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.chip button:hover{background:#E5848A;color:#1a0b0c}
.chip.addchip{padding:3px 4px 3px 10px;background:rgba(91,141,239,.12);border-color:rgba(91,141,239,.3)}
.chip.addchip input{background:none;border:none;outline:none;color:var(--ink);width:78px;font-size:12px}
.chip.addchip input::placeholder{color:#8FB2F5}
.chip.addchip button{background:var(--brand);color:#06101F;font-weight:700;width:auto;height:auto;padding:3px 9px;border-radius:20px;font-size:11px}

@media(max-width:980px){.kpis{grid-template-columns:1fr 1fr}.grid2,.grid3{grid-template-columns:1fr}}
@media(max-width:760px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}
  .main{margin-left:0}.hamb{display:block}
  .content{padding:14px 12px 60px}.topbar{padding:10px 12px;gap:8px;flex-wrap:wrap}
  .topbar h2{font-size:15px;max-width:46vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .crumb{display:none}
  .sync-pill span:last-child{display:none}.sync-pill{padding:7px 9px}
  .period-sel{padding:6px 8px;font-size:11px}
  .kpis{gap:10px}.kpi{padding:14px}.kpi .val{font-size:20px}
  .frow,.frow3{grid-template-columns:1fr}
  .lineitem{grid-template-columns:1fr 1fr;gap:6px}
  .modal-card{width:94vw;max-width:94vw}
  .grid2,.grid3{gap:12px}.card{padding:15px}
  .ai-msg .bubble{max-width:92%}
  .seg2 button{padding:7px 11px;font-size:12px}
  .rpt-kpi{grid-template-columns:1fr 1fr}
  .toolbar{flex-wrap:wrap;gap:8px}
  .sb-mask.on{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
}
.sb-mask{display:none}
#reportOverlay{position:fixed;inset:0;z-index:900;background:#fff;color:#222;overflow:auto;padding:26px}
.rpt{max-width:900px;margin:0 auto;font-family:'Noto Sans SC',sans-serif;color:#222}
.rpt h2{font-family:'Sora','Noto Sans SC',sans-serif;font-size:15px;color:#1C2541;margin:18px 0 6px;border-left:3px solid #5B8DEF;padding-left:8px}
.rpt table{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0 8px}
.rpt th,.rpt td{border:1px solid #e2e6ee;padding:7px 9px;text-align:left}
.rpt th{background:#f2f5fa;color:#445;font-weight:600}
.rpt td.n,.rpt th.n{text-align:right;font-family:'JetBrains Mono'}
.rpt-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0 4px}
.rpt-kpi div{border:1px solid #e3e8f2;border-radius:8px;padding:9px 12px}
.rpt-kpi small{color:#778;font-size:11px}.rpt-kpi b{display:block;font-family:'JetBrains Mono';font-size:17px;margin-top:2px;color:#1C2541}
.rpt-bar{display:flex;justify-content:space-between;align-items:center;border:1px solid #e2e6ee;border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:13px}
.rpt-actions{position:sticky;top:0;display:flex;gap:10px;justify-content:flex-end;background:#fff;padding-bottom:10px;margin-bottom:6px}
body.reporting{overflow:hidden}
@media print{
  .sidebar,.topbar,.no-print,.modal{display:none!important}
  .main{margin-left:0}.content{padding:0}body{background:#fff;color:#111}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;background:#fff;color:#111}
  body.reporting #app,body.reporting #login,body.reporting #modal,body.reporting #toast{display:none!important}
  #reportOverlay{position:static;padding:0;overflow:visible}
  .rpt-actions{display:none!important}.rpt h2{break-after:avoid}
  @page{margin:14mm}
}

:root{--soft2:rgba(255,255,255,.10);--cardbg:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));--kpibg:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02))}
body.light{--bg:#EEF3FA;--navy:#FFFFFF;--navy2:#F6F9FF;--panel:#FFFFFF;--ink:#1C2541;--muted:#5A6B85;
  --soft:rgba(28,37,65,.06);--soft2:rgba(28,37,65,.11);--border:rgba(28,37,65,.15);
  --cardbg:#FFFFFF;--kpibg:#FFFFFF;
  background:radial-gradient(1100px 680px at 82% -8%, rgba(91,141,239,.10), transparent 60%),linear-gradient(180deg,#EDF2FA,#E5EDF8);background-attachment:fixed,fixed}
body.light .sidebar{background:#FFFFFF;border-right:1px solid var(--border)}
body.light .topbar{background:rgba(255,255,255,.88);border-bottom:1px solid var(--border)}
body.light .modal-card{background:#FFFFFF}
body.light .card,body.light .kpi{box-shadow:0 4px 18px rgba(28,37,65,.07)}
body.light .ai-msg.bot .bubble{background:#F2F6FC}
body.light .period-sel option{background:#fff;color:#1C2541}
@media print{
  body:not(.reporting) *{color:#111!important;text-shadow:none!important;box-shadow:none!important;backdrop-filter:none!important}
  body:not(.reporting){background:#fff!important}
  body:not(.reporting) .card,body:not(.reporting) .kpi,body:not(.reporting) .tablewrap,body:not(.reporting) table,body:not(.reporting) th,body:not(.reporting) td{background:#fff!important;border-color:#bbb!important}
  body:not(.reporting) .tag2,body:not(.reporting) .chip{background:#fff!important;border:1px solid #999!important}
  body:not(.reporting) .login,body:not(.reporting) .ai-input{display:none!important}
}

.kico{width:27px;height:27px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:#fff;flex:none;box-shadow:0 2px 6px rgba(0,0,0,.18)}
.kico svg{width:15px;height:15px}
.kico.k1{background:linear-gradient(135deg,#5B8DEF,#6FD3E8)}
.kico.k2{background:linear-gradient(135deg,#3FC8C0,#5FC08A)}
.kico.k3{background:linear-gradient(135deg,#E0935A,#E6C260)}
.kico.k4{background:linear-gradient(135deg,#E87FA8,#9B8CEF)}
.card,.kpi{transition:transform .16s ease,box-shadow .16s ease}
@media(min-width:761px){.card:hover,.kpi:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.18)}}
.inv-h{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1C2541;padding-bottom:12px;margin-bottom:14px}
.inv-meta{font-size:12px;color:#556;line-height:1.7}
.inv-total{display:flex;justify-content:flex-end;margin-top:10px}
.inv-total table{width:auto;min-width:260px}
.inv-sign{display:flex;justify-content:space-between;margin-top:46px;font-size:12px;color:#556}
.inv-sign div{width:42%;border-top:1px solid #999;padding-top:6px;text-align:center}

body.fs-lg{font-size:16px}
body.fs-xl{font-size:17.5px}
.fs-lg td,.fs-lg th{font-size:13.5px}.fs-xl td,.fs-xl th{font-size:14.5px}
.fs-lg input,.fs-lg select,.fs-lg textarea{font-size:15px}.fs-xl input,.fs-xl select,.fs-xl textarea{font-size:16px}
.fs-lg .nav a{font-size:14.5px}.fs-xl .nav a{font-size:15.5px}
.fs-lg .csub{font-size:12.5px}.fs-xl .csub{font-size:13.5px}
.fs-lg .kpi .lbl{font-size:13px}.fs-xl .kpi .lbl{font-size:14px}
.fs-lg .kpi .delta{font-size:12px}.fs-xl .kpi .delta{font-size:13px}
.fs-xl .kpi .val{font-size:28px}
.fs-lg .chip{font-size:12.5px}.fs-xl .chip{font-size:13.5px}
.fs-lg .ai-msg .bubble{font-size:14.5px}.fs-xl .ai-msg .bubble{font-size:15.5px}
.fs-lg .card h3{font-size:16px}.fs-xl .card h3{font-size:17px}
.login-card input{color:#fff!important;caret-color:#fff;background:rgba(255,255,255,.08)}
body.light .login{background:linear-gradient(180deg,#0A1322,#0E1729)!important}
select option{background:var(--panel);color:var(--ink)}
body.light select option{background:#FFFFFF;color:#1C2541}

const Store = (()=>{
  let mem={}, ok=true;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');}catch(e){ok=false;}
  return {
    ok,
    get(k){try{return ok?localStorage.getItem(k):(k in mem?mem[k]:null);}catch(e){return mem[k]??null;}},
    set(k,v){try{ok?localStorage.setItem(k,v):mem[k]=v;}catch(e){mem[k]=v;}},
    del(k){try{ok?localStorage.removeItem(k):delete mem[k];}catch(e){delete mem[k];}}
  };
})();

function animVals(){
  document.querySelectorAll('.kpi .val').forEach(el=>{
    const txt=el.textContent; const m=txt.match(/([\-\d,\.]+)/); if(!m||txt.includes('•'))return;
    const target=parseFloat(m[1].replace(/,/g,'')); if(!isFinite(target))return;
    const pre=txt.slice(0,m.index), suf=txt.slice(m.index+m[1].length);
    const dec=(m[1].split('.')[1]||'').length; const t0=performance.now(), dur=520;
    function step(t){ const k=Math.min(1,(t-t0)/dur); const e=1-Math.pow(1-k,3);
      el.textContent=pre+(target*e).toLocaleString('en-MY',{minimumFractionDigits:dec,maximumFractionDigits:dec})+suf;
      if(k<1)requestAnimationFrame(step); else el.textContent=txt; }
    requestAnimationFrame(step);
  });
}

function colSeq(entity){

function buildTable(entity,rows,sortState,sortFn,showN,moreFn,actions,emptyMsg){
  const seq=colSeq(entity);

  const body=rows.slice(0,showN).map(r=>'<tr>'+seq.map(c=>`<td${c.n?' class="num"':''}>${c.r(r)}</td>`).join('')+`<td class="no-print">${actions(r)}</td></tr>`).join('')
    || `<tr><td colspan="${seq.length+1}" class="empty">${emptyMsg}</td></tr>`;
  return `<div class="tablewrap"><table><thead><tr>${head}</tr></thead><tbody>${body}${moreRow(seq.length+1,rows.length,showN,moreFn)}</tbody></table></div>`;

function normalizeDB(){
  DB.categories=DB.categories||[]; DB.products=DB.products||[]; DB.customers=DB.customers||[];
  DB.salespersons=DB.salespersons||[]; DB.orders=DB.orders||[];
  DB.settings=Object.assign({password:'8888',gateOn:true,sheetId:'',sheetTabs:{customers:'customers',products:'products',orders:'orders'}},DB.settings||{});

  DB.settings.dict=DB.settings.dict||{};
  for(const k in DICT_DEFAULTS){ if(!Array.isArray(DB.settings.dict[k])||!DB.settings.dict[k].length) DB.settings.dict[k]=[...DICT_DEFAULTS[k]]; }
  DB.settings.hiddenViews=DB.settings.hiddenViews||[];
  DB.settings.targets=DB.settings.targets||{sales:0,profit:0};
  DB.settings.budget=DB.settings.budget||{expense:0};
  DB.settings.alerts=Object.assign({netMarginMin:5,arMax:0,aging90Max:0,lapseDays:60},DB.settings.alerts||{});
  DB.settings.hideProfit=DB.settings.hideProfit||false;
  DB.settings.customFields=DB.settings.customFields||{customer:[],product:[],salesperson:[],order:[]};
  DB.settings.theme=DB.settings.theme||'light';
  DB.settings.fontScale=DB.settings.fontScale||1.12;
  DB.settings.company=Object.assign({name:'',reg:'',addr:'',phone:''},DB.settings.company||{});
  DB.settings.aiKey=DB.settings.aiKey||'';
  DB.settings.cols=DB.settings.cols||{};
  Object.keys(COLS).forEach(e=>{
    const def=COLS[e].map(c=>c.k);
    const cfg=DB.settings.cols[e]=DB.settings.cols[e]||{order:[...def],hide:[]};
    cfg.order=(cfg.order||[]).filter(k=>def.includes(k)); def.forEach(k=>{if(!cfg.order.includes(k))cfg.order.push(k);});
    cfg.hide=(cfg.hide||[]).filter(k=>def.includes(k));
  });
  DB.settings.dash=DB.settings.dash||{order:DASHW.map(d=>d[0]),hide:[]};
  DASHW.forEach(d=>{if(!DB.settings.dash.order.includes(d[0]))DB.settings.dash.order.push(d[0]);});

  DB.purchases=DB.purchases||[]; DB.expenses=DB.expenses||[]; DB.returns=DB.returns||[]; DB.followups=DB.followups||[];
  // default older orders to paid
  DB.orders.forEach(o=>{ if(o.paymentStatus===undefined){o.paymentStatus='paid';o.paidAmount=o.totalAmount;} });
}

function mulberry(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

function ordersInPeriod(){ const c=periodCutoff(); return c? DB.orders.filter(o=>o.date>=c) : DB.orders; }
function expensesInPeriod(){ const c=periodCutoff(); return c? (DB.expenses||[]).filter(e=>e.date>=c):(DB.expenses||[]); }
function returnsInPeriod(){ const c=periodCutoff(); return c? (DB.returns||[]).filter(r=>r.date>=c):(DB.returns||[]); }

function customerStats(){
  const ORD=ordersInPeriod(); const map={};
  DB.customers.forEach(c=> map[c.id]={...c,sales:0,profit:0,count:0,last:null});
  ORD.forEach(o=>{
    const m=map[o.customerId]; if(!m)return;
    m.sales+=o.totalAmount; m.profit+=o.totalProfit; m.count++;
    if(!m.last||o.date>m.last) m.last=o.date;
  });
  returnsInPeriod().forEach(r=>{ const m=map[r.customerId]; if(!m)return;
    m.sales-=r.qty*r.unitPrice; m.profit-=r.qty*(r.unitPrice-r.unitCost); });
  const arr=Object.values(map);
  const active=arr.filter(c=>c.count>0);
  const profits=active.map(c=>c.profit).sort((a,b)=>b-a);
  const topProfit = profits.length? profits[Math.floor(profits.length*0.25)] : 0;
  const td=today();
  arr.forEach(c=>{
    if(c.count===0){ c.tier='potential'; c.recency=null; return; }
    const rec=daysBetween(c.last,td); c.recency=rec;
    if(rec>180) c.tier='lost';
    else if(rec>90) c.tier='risk';
    else {
      if(c.count>=3 && c.profit>=topProfit) c.tier='vip';
      else if(c.count>=2) c.tier='active';
      else c.tier='potential';
    }
    c.aov = c.count? c.sales/c.count : 0;
  });
  return arr;
}
function productStats(){
  const ORD=ordersInPeriod(); const map={};
  DB.products.forEach(p=> map[p.id]={...p,qty:0,sales:0,profit:0,orders:0,last:null});
  ORD.forEach(o=> o.items.forEach(it=>{
    const m=map[it.productId]; if(!m)return;
    m.qty+=it.qty; m.sales+=it.qty*it.unitPrice; m.profit+=it.qty*(it.unitPrice-it.unitCost); m.orders++;
    if(!m.last||o.date>m.last)m.last=o.date;
  }));
  returnsInPeriod().forEach(r=>{ const m=map[r.productId]; if(!m)return;
    m.qty-=r.qty; m.sales-=r.qty*r.unitPrice; m.profit-=r.qty*(r.unitPrice-r.unitCost); });
  const purchased={}; (DB.purchases||[]).forEach(pu=>{ purchased[pu.productId]=(purchased[pu.productId]||0)+(+pu.qty||0); });
  const soldAll={}; DB.orders.forEach(o=>o.items.forEach(it=>{ soldAll[it.productId]=(soldAll[it.productId]||0)+it.qty; }));
  const retAll={}; (DB.returns||[]).forEach(r=>{ retAll[r.productId]=(retAll[r.productId]||0)+(+r.qty||0); });
  const cut90=offsetDate(-90); const sold90={};
  DB.orders.forEach(o=>{ if(o.date>=cut90) o.items.forEach(it=>{ sold90[it.productId]=(sold90[it.productId]||0)+it.qty; }); });
  const arr=Object.values(map);
  const td=today();
  arr.forEach(p=>{
    p.margin = p.sales>0 ? p.profit/p.sales : (p.price>0?(p.price-p.cost)/p.price:0);
    p.recency = p.last? daysBetween(p.last,td):null;
    p.lowProfit = p.margin>0 && p.margin<0.20;
    p.slow = p.qty<=0 || (p.recency!=null && p.recency>120);
    p.purchased=purchased[p.id]||0; p.soldAll=soldAll[p.id]||0; p.returned=retAll[p.id]||0;
    p.stock=(+p.openingStock||0)+p.purchased-p.soldAll+p.returned;
    p.safety=+p.safetyStock||0; p.stockValue=p.stock*(+p.cost||0);
    p.outOfStock=p.stock<=0; p.lowStock=!p.outOfStock && p.stock<=p.safety;
    p.dailyV=(sold90[p.id]||0)/90;
    p.daysCover = p.dailyV>0 ? Math.round(p.stock/p.dailyV) : null;
    const target = p.dailyV*30 + p.safety;
    p.suggestQty = (p.stock<=p.safety || (p.daysCover!=null && p.daysCover<30)) ? Math.max(0, Math.ceil(target - p.stock)) : 0;
  });
  return arr;
}

function arAging(){ const buckets={'0-30':0,'31-60':0,'61-90':0,'90+':0}; const td=today();

function totals(){
  const ORD=ordersInPeriod();
  const grossRev=ORD.reduce((s,o)=>s+o.totalAmount,0);
  const grossPft=ORD.reduce((s,o)=>s+o.totalProfit,0);
  const RET=returnsInPeriod();
  const retAmt=RET.reduce((s,r)=>s+r.qty*r.unitPrice,0);
  const retPft=RET.reduce((s,r)=>s+r.qty*(r.unitPrice-r.unitCost),0);
  const rev=grossRev-retAmt; const grossProfit=grossPft-retPft;
  const expenses=expensesInPeriod().reduce((s,e)=>s+(+e.amount||0),0);
  const netProfit=grossProfit-expenses;
  const ps=productStats();
  const stockValue=ps.reduce((s,p)=>s+(p.stockValue>0?p.stockValue:0),0);
  const ar=arOutstanding().total;
  return {rev,pft:grossProfit,grossProfit,returns:retAmt,expenses,netProfit,ar,
    custs:DB.customers.length,prods:DB.products.length,
    margin: rev>0?grossProfit/rev:0, netMargin: rev>0?netProfit/rev:0, orders:ORD.length,
    stockValue, lowCount:ps.filter(p=>p.lowStock).length, outCount:ps.filter(p=>p.outOfStock).length};

  const N=series.length; if(N<2) return Array(n).fill(series[N-1]||0);
  let sx=0,sy=0,sxx=0,sxy=0; series.forEach((y,x)=>{sx+=x;sy+=y;sxx+=x*x;sxy+=x*y;});
  const denom=(N*sxx-sx*sx)||1; const b=(N*sxy-sx*sy)/denom; const a=(sy-b*sx)/N;
  const out=[]; for(let i=0;i<n;i++) out.push(Math.max(0,Math.round(a+b*(N+i)))); return out;
}

  confirmBox(`确定删除客户「${c.name}」？`+(has?'<br><span style="color:#F2888C">该客户已有订单记录，删除后订单将失去关联。</span>':''),()=>{
    DB.customers=DB.customers.filter(x=>x.id!==id); save(); refreshCust(); toast('已删除');

  return `

function refreshProd(){
  const el=document.getElementById('prodTable'); if(!el)return;
  let arr=productStats();
  if(prodFilter==='low')arr=arr.filter(p=>p.lowProfit);
  if(prodFilter==='slow')arr=arr.filter(p=>p.slow);
  if(prodSearch){const q=prodSearch.toLowerCase();arr=arr.filter(p=>(p.sku+p.name).toLowerCase().includes(q));}
  arr.forEach(p=>{p.catName=(byId(DB.categories,p.categoryId)||{}).name||'—';});
  arr.sort(cmpBy(prodSort.k,prodSort.d));
  el.innerHTML=buildTable('product',arr,prodSort,'sortProd',prodShow,'prodShow=1e9;refreshProd()',
    p=>`<button class="icbtn" onclick="openProductDetail('${p.id}')">👁</button> <button class="icbtn" onclick="editProduct('${p.id}')">✎</button> <button class="icbtn" onclick="delProduct('${p.id}')">🗑</button>`,
    '<div class="big">📦</div>没有符合条件的产品');
}

function stockCell(p){ const c=p.outOfStock?'#F0989C':(p.lowStock?'#F0A878':'var(--ink)');
  return `<span style="color:${c};font-weight:600">${num(p.stock)}</span> <span style="color:var(--muted);font-size:11px">${esc(p.unit||'')}</span>`; }

    <div class="frow"><div class="field"><label>期初库存</label><input id="p_open" type="number" value="${p.openingStock??0}"></div>
      <div class="field"><label>安全库存（低于则预警）</label><input id="p_safe" type="number" value="${p.safetyStock??0}"></div></div>

function saveProduct(id){
  const sku=document.getElementById('p_sku').value.trim(),name=document.getElementById('p_name').value.trim();
  if(!sku||!name){toast('请填写 SKU 与产品名称');return;}
  const data={sku,name,categoryId:document.getElementById('p_cat').value,
    brand:document.getElementById('p_brand').value.trim(),unit:document.getElementById('p_unit').value.trim()||'pcs',
    openingStock:+document.getElementById('p_open').value||0,safetyStock:+document.getElementById('p_safe').value||0,
    cost:+document.getElementById('p_cost').value||0,price:+document.getElementById('p_price').value||0,
    priceWS:+document.getElementById('p_ws').value||0,cf:cfCollect('product')};
  if(id)Object.assign(byId(DB.products,id),data);
  else DB.products.push({id:uid('pr'),...data});
  save();closeModal();refreshProd();toast('产品已保存');
}
function delProduct(id){
  const p=byId(DB.products,id);
  confirmBox(`确定删除产品「${p.name}」？`,()=>{DB.products=DB.products.filter(x=>x.id!==id);save();refreshProd();toast('已删除');});
}

  const alerts=[...out,...low];
  const reorder=ps.filter(p=>p.suggestQty>0).sort((a,b)=>(a.daysCover==null?1e9:a.daysCover)-(b.daysCover==null?1e9:b.daysCover));
  const inv=[...ps].sort((a,b)=>b.stockValue-a.stockValue);
  const pur=[...(DB.purchases||[])].sort((a,b)=>a.date<b.date?1:-1).slice(0,40);
  return `
  <div class="kpis">

    <div class="kpi c4"><div class="lbl">🛑 缺货 SKU</div><div class="val">${out.length}</div><div class="delta">需尽快补货</div></div>
    <div class="kpi c2"><div class="lbl">📦 产品种类 SKU</div><div class="val">${ps.length}</div><div class="delta">${(DB.purchases||[]).length} 笔进货记录</div></div>
  </div>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">${alerts.map(p=>`<span class="chip" style="cursor:pointer" onclick="editPurchase('','${p.id}')">${p.outOfStock?'🛑':'⚠️'} ${esc(p.name)} · 余 ${num(p.stock)}${esc(p.unit||'')}</span>`).join('')}</div></div>`:''}
  ${reorder.length?`<div class="card" style="margin-bottom:16px"><h3>📋 智能补货建议</h3><div class="csub">按近 90 天销售速度 + 安全库存自动计算 · 点「进货」一键补货</div>

    ${reorder.map(p=>`<tr><td><b>${esc(p.name)}</b> <span style="color:var(--muted);font-size:11px">${esc(p.sku)}</span></td>
      <td class="num">${stockCell(p)}</td><td class="num">${p.dailyV.toFixed(1)}</td>
      <td class="num" style="color:${p.daysCover!=null&&p.daysCover<14?'#F0989C':'var(--ink)'}">${p.daysCover!=null?p.daysCover+' 天':'—'}</td>
      <td class="num" style="color:#5FC08A;font-weight:700">${num(p.suggestQty)} ${esc(p.unit||'')}</td>
      <td class="no-print"><button class="btn gold sm" onclick="quickReorder('${p.id}',${p.suggestQty})">进货</button></td></tr>`).join('')}
    </tbody></table></div></div>`:''}
  <div class="grid3">
    <div class="card"><h3>🏷️ 库存明细</h3><div class="csub">当前库存 = 期初 + 累计进货 − 累计销售</div>
      <div class="tablewrap"><table><thead><tr><th>产品</th><th class="num">当前库存</th><th class="num">安全库存</th><th>状态</th><th class="num">累计进货</th><th class="num">累计售出</th><th class="num">库存价值</th></tr></thead><tbody>
      ${inv.map(p=>`<tr><td><b>${esc(p.name)}</b> <span style="color:var(--muted);font-size:11px">${esc(p.sku)}</span></td>
        <td class="num">${stockCell(p)}</td><td class="num">${num(p.safety)}</td>
        <td>${p.outOfStock?'<span class="tag2 lo">缺货</span>':(p.lowStock?'<span class="tag2 risk">低库存</span>':'<span class="tag2 ok">正常</span>')}</td>
        <td class="num">${num(p.purchased)}</td><td class="num">${num(p.soldAll)}</td>
        <td class="num">${money(p.stockValue)}</td></tr>`).join('')||'<tr><td colspan="7" class="empty">暂无产品</td></tr>'}
      </tbody></table></div></div>

    </tbody></table></div></div>`;
}
function afterInventory(){

  const el=document.getElementById('chInvVal'); if(!el)return;
  charts.inv=new Chart(el,{type:'bar',data:{labels:inv.map(p=>p.name),datasets:[{data:inv.map(p=>R(p.stockValue)),backgroundColor:'#5B8DEF',borderRadius:6}]},options:barOpts(true)});
}
function quickReorder(pid,qty){ editPurchase('',pid,qty); }
function editPurchase(id,presetPid,presetQty){
  const pu=id?(DB.purchases||[]).find(x=>x.id===id):null;
  const pid=pu?pu.productId:(presetPid||'');
  const prodOpts=DB.products.map(p=>`<option value="${p.id}" ${pid===p.id?'selected':''}>${esc(p.name)} (${esc(p.sku)})</option>`).join('');
  const defCost=pu?pu.unitCost:(byId(DB.products,pid)||{}).cost||'';
  const defSup=pu?pu.supplier:(byId(DB.products,pid)||{}).brand||'';
  const defQty=pu?pu.qty:(presetQty||1);
  openModal(id?'编辑进货':'新增进货',`
    <div class="frow"><div class="field"><label>日期</label><input id="pu_date" type="date" value="${pu?pu.date:today()}"></div>
      <div class="field"><label>产品 *</label><select id="pu_prod" onchange="puFill()"><option value="">— 选产品 —</option>${prodOpts}</select></div></div>
    <div class="frow3"><div class="field"><label>数量 *</label><input id="pu_qty" type="number" min="1" value="${defQty}"></div>
      <div class="field"><label>进价 (RM)</label><input id="pu_cost" type="number" step="0.01" value="${defCost}"></div>
      <div class="field"><label>供应商</label><input id="pu_sup" value="${esc(defSup)}"></div></div>
    <div class="field"><label>备注</label><input id="pu_note" value="${esc(pu?pu.note||'':'')}" placeholder="选填"></div>`,
    `<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn gold" onclick="savePurchase('${id||''}')">保存</button>`);
}
function puFill(){ const p=byId(DB.products,document.getElementById('pu_prod').value); if(p){ if(!document.getElementById('pu_cost').value)document.getElementById('pu_cost').value=p.cost; if(!document.getElementById('pu_sup').value)document.getElementById('pu_sup').value=p.brand||''; } }
function savePurchase(id){
  const productId=document.getElementById('pu_prod').value; if(!productId){toast('请选择产品');return;}
  const data={date:document.getElementById('pu_date').value||today(),productId,
    qty:+document.getElementById('pu_qty').value||0,unitCost:+document.getElementById('pu_cost').value||0,
    supplier:document.getElementById('pu_sup').value.trim(),note:document.getElementById('pu_note').value.trim()};
  if(data.qty<=0){toast('数量需大于0');return;}
  DB.purchases=DB.purchases||[];
  if(id)Object.assign(DB.purchases.find(x=>x.id===id),data); else DB.purchases.push({id:uid('pu'),...data});
  save();closeModal();render('inventory');toast('进货已保存');
}
function delPurchase(id){ confirmBox('确定删除这笔进货记录？',()=>{DB.purchases=DB.purchases.filter(x=>x.id!==id);save();render('inventory');toast('已删除');}); }

/* ==================== DETAIL DRILL-DOWN ==================== */
function lastMonths(n){ const td=new Date(); const keys=[],labels=[];
  for(let i=n-1;i>=0;i--){const d=new Date(td.getFullYear(),td.getMonth()-i,1);keys.push(d.toISOString().slice(0,7));labels.push((d.getMonth()+1)+'月');}
  return {keys,labels}; }
function dkpi(items){ return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:4px 0 16px">${items.map(it=>`<div style="background:var(--soft);border:1px solid var(--border);border-radius:12px;padding:11px 12px"><div style="font-size:11px;color:var(--muted)">${it[0]}</div><div style="font-family:'JetBrains Mono';font-size:16px;font-weight:700;margin-top:3px;color:var(--ink)">${it[1]}</div></div>`).join('')}</div>`; }
function drawDetailChart(cid,labels,sales,profit){
  setTimeout(()=>{ const el=document.getElementById(cid); if(!el)return;
    try{charts.detail&&charts.detail.destroy();}catch(e){}
    charts.detail=new Chart(el,{type:'line',data:{labels,datasets:[
      {label:'销售额',data:sales.map(R),borderColor:'#5B8DEF',backgroundColor:'rgba(91,141,239,.12)',fill:true,tension:.35,borderWidth:2,pointRadius:2},
      {label:'利润',data:profit.map(R),borderColor:'#3FC8C0',backgroundColor:'rgba(63,200,192,.10)',fill:true,tension:.35,borderWidth:2,pointRadius:2}]},options:lineOpts()});
  },50);
}

    `<button class="btn ghost" onclick="editCustomer('${id}')">编辑</button><button class="btn gold" onclick="closeModal()">关闭</button>`);
  drawDetailChart('chDetail',lm.labels,mS,mP);

}

const BDIMS=[['customer','客户'],['product','产品'],['salesperson','销售员'],['region','地区'],['industry','行业'],['source','来源'],['channel','渠道'],['month','月份']];
const BMEAS=[['profit','利润'],['sales','销售额'],['count','订单/客户数'],['qty','销量']];
let builderState={dim:'region',meas:'profit',chart:'bar'};
function dimLabel(d){return (BDIMS.find(x=>x[0]===d)||[])[1]||d;}
function measLabel(m){return (BMEAS.find(x=>x[0]===m)||[])[1]||m;}
function builderAgg(dim,meas){
  let rows=[];
  const pick=(o,p,s,c,q)=> meas==='profit'?p: meas==='sales'?s: meas==='qty'?q: c;
  if(dim==='customer') rows=customerStats().map(c=>({label:c.name,value:pick(0,c.profit,c.sales,c.count,c.count)}));
  else if(dim==='product') rows=productStats().map(p=>({label:p.name,value:pick(0,p.profit,p.sales,p.orders,p.qty)}));
  else if(dim==='salesperson') rows=salespersonStats().map(s=>({label:s.name,value:pick(0,s.profit,s.sales,s.orders,s.orders)}));
  else if(dim==='region'||dim==='industry'||dim==='source'){ rows=aggBy(dim).filter(x=>x.key!=='未分类').map(x=>({label:x.key,value:pick(0,x.profit,x.sales,x.custs,x.orders)})); }
  else if(dim==='channel'){ rows=aggOrderBy('channel').filter(x=>x.key!=='未分类').map(x=>({label:x.key,value:pick(0,x.profit,x.amount,x.count,x.count)})); }
  else if(dim==='month'){ const tr=monthlyTrend(); rows=tr.labels.map((l,i)=>({label:l,value: meas==='sales'?tr.sales[i]: tr.profit[i]})); return rows; }
  rows=rows.filter(r=>r.value);
  rows.sort((a,b)=>b.value-a.value);
  return rows.slice(0,15);
}

function builderRender(target,dim,meas,chart){
  const data=builderAgg(dim,meas);
  if(!data.length){ document.getElementById(target).innerHTML='<div class="empty" style="padding:20px">该组合暂无数据</div>'; return; }
  const money2=(meas==='profit'||meas==='sales');
  if(chart==='table'){
    document.getElementById(target).innerHTML=`<div class="tablewrap"><table><thead><tr><th>${dimLabel(dim)}</th><th class="num">${measLabel(meas)}</th></tr></thead><tbody>${data.map(r=>`<tr><td>${esc(r.label)}</td><td class="num">${money2?money(r.value):num(r.value)}</td></tr>`).join('')}</tbody></table></div>`;
    return;
  }
  const cv=document.createElement('canvas'); const host=document.getElementById(target); host.innerHTML=''; host.appendChild(cv);
  const cols=['#5B8DEF','#3FC8C0','#E6C260','#E0935A','#E87FA8','#9B8CEF','#5FC08A','#A0AEC0','#E8A33D','#7FB069','#D4A5D8','#5BC0BE','#EBCB6E','#F0989C','#8FB2F5'];
  if(chart==='doughnut'){ new Chart(cv,{type:'doughnut',data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>R(d.value)),backgroundColor:cols,borderWidth:2,borderColor:panelCol()}]},options:{responsive:true,maintainAspectRatio:false,cutout:'52%',plugins:{legend:{position:'right',labels:{font:{family:'Noto Sans SC',size:10.5},padding:6,usePointStyle:true,boxWidth:8}}}}}); }
  else { new Chart(cv,{type:chart,data:{labels:data.map(d=>d.label),datasets:[{label:measLabel(meas),data:data.map(d=>R(d.value)),backgroundColor:chart==='line'?'rgba(91,141,239,.15)':'#5B8DEF',borderColor:'#5B8DEF',borderRadius:6,fill:chart==='line',tension:.3}]},options:chart==='bar'?barOpts(true):lineOpts()}); }
}
function runBuilder(){ builderState={dim:document.getElementById('b_dim').value,meas:document.getElementById('b_meas').value,chart:document.getElementById('b_chart').value};
  const host=document.getElementById('b_out'); host.className='card'; host.innerHTML=builderState.chart==='table'?'<div id="b_render"></div>':'<div class="chwrap" id="b_render"></div>';

function saveBuilder(){ runBuilder(); const name=`${dimLabel(builderState.dim)} 的 ${measLabel(builderState.meas)}`;

function whatIf(){
  const el=document.getElementById('wi_out'); if(!el)return;
  const t=totals(); const base={rev:t.rev,cost:t.rev-t.grossProfit,exp:t.expenses,gross:t.grossProfit,net:t.netProfit};

  const nRev=base.rev*fp*fv, nCost=base.cost*fc*fv, nGross=nRev-nCost, nExp=base.exp*fe, nNet=nGross-nExp;

  el.innerHTML=`<div style="margin-top:12px">${row('销售额',base.rev,nRev)}${row('毛利',base.gross,nGross)}${row('净利',base.net,nNet)}

}

    paymentStatus:payStat,paidAmount,
    items,totalAmount,totalCost,totalProfit:totalAmount-totalCost,cf:cfCollect('order')};
  if(id)Object.assign(byId(DB.orders,id),data);
  else DB.orders.unshift({id:uid('or'),...data});

function abcData(mode){
  let arr = mode==='product'

  cs.forEach(c=>{const k=c[field]||'未分类'; (m[k]=m[k]||{key:k,sales:0,profit:0,custs:0,orders:0});
    m[k].sales+=c.sales;m[k].profit+=c.profit;m[k].custs++;m[k].orders+=c.count;});
  return Object.values(m).sort((a,b)=>b.profit-a.profit);

function aggOrderBy(field){

function insights(){
  const cs=customerStats().filter(c=>c.profit>0).sort((a,b)=>b.profit-a.profit);
  const ps=productStats().filter(p=>p.profit>0).sort((a,b)=>b.profit-a.profit);
  const t=totals(); const out=[];
  if(cs[0])out.push(`最赚钱客户是 <b>${esc(cs[0].name)}</b>，贡献利润 <b>${money(cs[0].profit)}</b>。`);
  const top3=cs.slice(0,3).reduce((s,c)=>s+c.profit,0), allP=cs.reduce((s,c)=>s+c.profit,0)||1;
  out.push(`前 3 大客户占总利润的 <b>${pct(top3/allP)}</b>${top3/allP>0.5?'，利润集中度偏高，需注意客户依赖风险。':'。'}`);
  if(ps[0])out.push(`最赚钱产品是 <b>${esc(ps[0].name)}</b>，利润 <b>${money(ps[0].profit)}</b>。`);
  const risk=customerStats().filter(c=>c.tier==='risk'||c.tier==='lost');
  if(risk.length)out.push(`有 <b>${risk.length}</b> 个客户处于风险/流失状态，建议安排销售员主动跟进。`);
  const low=productStats().filter(p=>p.lowProfit);
  if(low.length)out.push(`有 <b>${low.length}</b> 个低利润产品（利润率<20%），可检讨定价。`);
  out.push(`整体利润率为 <b>${pct(t.margin)}</b>，共 ${t.orders} 张订单。`);
  return out;
}

/* ==================== GOOGLE SHEET SYNC ==================== */
function gvizUrl(tab){ return `https://docs.google.com/spreadsheets/d/${DB.settings.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`; }
async function syncSheet(){
  if(!DB.settings.sheetId){toast('请先填写 Google Sheet ID');return;}
  toast('正在从 Google Sheet 同步…');
  try{
    const [cRows,pRows,oRows]=await Promise.all([
      fetchCsv(gvizUrl(DB.settings.sheetTabs.customers)).catch(()=>null),
      fetchCsv(gvizUrl(DB.settings.sheetTabs.products)).catch(()=>null),
      fetchCsv(gvizUrl(DB.settings.sheetTabs.orders)).catch(()=>null),
    ]);
    if(pRows) ingestProducts(pRows);
    if(cRows) ingestCustomers(cRows);
    if(oRows) ingestOrders(oRows);
    save();updateSyncPill();go(curView);toast('同步完成 ✓');
  }catch(e){ toast('同步失败：请确认表格已公开且 ID 正确'); }
}
async function fetchCsv(url){
  const r=await fetch(url); if(!r.ok)throw 0; const txt=await r.text();
  const wb=XLSX.read(txt,{type:'string'}); const ws=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{defval:''});
}

/* ==================== EXCEL IMPORT / EXPORT ==================== */
function importExcel(ev,type){
  const file=ev.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!rows.length){toast('文件为空');return;}
      if(type==='customers')ingestCustomers(rows);
      if(type==='products')ingestProducts(rows);
      if(type==='orders')ingestOrders(rows);
      if(type==='purchases')ingestPurchases(rows);
      save();go(curView);toast(`已导入 ${rows.length} 行`);
    }catch(err){toast('导入失败：请检查文件格式');}
  };
  rd.readAsArrayBuffer(file); ev.target.value='';
}
function gv(row,keys){ for(const k of keys){ for(const rk in row){ if(rk.toLowerCase().trim()===k)return row[rk]; } } return ''; }
function ingestProducts(rows){
  rows.forEach(r=>{
    const sku=String(gv(r,['sku'])).trim(); const name=String(gv(r,['name','产品名称','产品'])).trim();
    if(!sku&&!name)return;
    let p=DB.products.find(x=>x.sku===sku);
    const catName=String(gv(r,['category','分类'])).trim();
    let catId=''; if(catName){let c=DB.categories.find(x=>x.name===catName); if(!c){c={id:uid('cat'),name:catName};DB.categories.push(c);} catId=c.id;}
    const data={sku,name,categoryId:catId,brand:String(gv(r,['brand','品牌','supplier','供应商'])).trim(),
      unit:String(gv(r,['unit','单位'])).trim()||'pcs',cost:+gv(r,['cost','成本'])||0,price:+gv(r,['price','售价'])||0,
      openingStock:+gv(r,['openingstock','期初库存','库存'])||0,safetyStock:+gv(r,['safetystock','安全库存'])||0};
    if(p)Object.assign(p,data); else DB.products.push({id:uid('pr'),...data});
  });
}
function ingestPurchases(rows){
  rows.forEach(r=>{
    const pname=String(gv(r,['product','产品','sku'])).trim(); if(!pname)return;
    let p=DB.products.find(x=>x.name===pname||x.sku===pname);
    if(!p){ p={id:uid('pr'),sku:pname,name:pname,categoryId:'',cost:+gv(r,['unitcost','进价','成本'])||0,price:0,unit:'pcs',openingStock:0,safetyStock:0}; DB.products.push(p); }
    DB.purchases=DB.purchases||[];
    DB.purchases.push({id:uid('pu'),date:fmtDate(gv(r,['date','日期'])),productId:p.id,
      qty:+gv(r,['qty','数量'])||0,unitCost:+gv(r,['unitcost','进价','成本'])||p.cost||0,
      supplier:String(gv(r,['supplier','供应商'])).trim(),note:String(gv(r,['note','备注'])).trim()});
  });
}
function ingestCustomers(rows){
  rows.forEach(r=>{
    const name=String(gv(r,['name','客户名称','客户'])).trim(); if(!name)return;
    let c=DB.customers.find(x=>x.name===name);
    const spName=String(gv(r,['salesperson','负责销售','销售员'])).trim();
    let spId=''; if(spName){let s=DB.salespersons.find(x=>x.name===spName); if(!s){s={id:uid('sp'),name:spName,role:'sales'};DB.salespersons.push(s);} spId=s.id;}
    const data={name,phone:String(gv(r,['phone','电话'])).trim(),company:String(gv(r,['company','公司'])).trim(),
      industry:String(gv(r,['industry','行业','类别'])).trim(),region:String(gv(r,['region','state','州属','地区'])).trim(),
      source:String(gv(r,['source','来源','客户来源'])).trim(),payHabit:String(gv(r,['payhabit','付款习惯','信用'])).trim()||'正常',
      ssm:String(gv(r,['ssm'])).trim(),sst:String(gv(r,['sst'])).trim(),taxNo:String(gv(r,['taxno','tax','税务号'])).trim(),salespersonId:spId};
    if(c)Object.assign(c,data); else DB.customers.push({id:uid('cu'),createdAt:today(),...data});
  });
}
function ingestOrders(rows){
  const groups={};
  rows.forEach(r=>{
    const no=String(gv(r,['orderno','order','订单号'])).trim(); if(!no)return;
    if(!groups[no])groups[no]={orderNo:no,date:fmtDate(gv(r,['date','日期'])),
      customer:String(gv(r,['customer','客户'])).trim(),salesperson:String(gv(r,['salesperson','销售员'])).trim(),
      channel:String(gv(r,['channel','渠道','销售渠道'])).trim(),payMethod:String(gv(r,['paymethod','付款方式'])).trim(),
      discount:+gv(r,['discount','折扣'])||0,items:[]};
    const pname=String(gv(r,['product','产品','sku'])).trim(); if(!pname)return;
    let p=DB.products.find(x=>x.name===pname||x.sku===pname);
    groups[no].items.push({product:pname,pid:p?p.id:'',qty:+gv(r,['qty','数量'])||1,
      unitPrice:+gv(r,['unitprice','单价'])|| (p?p.price:0), unitCost:+gv(r,['unitcost','成本'])||(p?p.cost:0)});
  });
  Object.values(groups).forEach(g=>{
    let cust=DB.customers.find(x=>x.name===g.customer);
    if(!cust&&g.customer){cust={id:uid('cu'),name:g.customer,phone:'',company:'',salespersonId:'',createdAt:today()};DB.customers.push(cust);}
    let sp=DB.salespersons.find(x=>x.name===g.salesperson);
    if(!sp&&g.salesperson){sp={id:uid('sp'),name:g.salesperson,role:'sales'};DB.salespersons.push(sp);}
    const items=g.items.map(i=>({productId:i.pid,qty:i.qty,unitPrice:i.unitPrice,unitCost:i.unitCost}));
    const gross=items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
    const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
    const discount=g.discount||0; const totalAmount=gross-discount;
    let ex=DB.orders.find(o=>o.orderNo===g.orderNo);
    const data={orderNo:g.orderNo,date:g.date||today(),customerId:cust?cust.id:'',salespersonId:sp?sp.id:(cust?cust.salespersonId:''),
      channel:g.channel||'',payMethod:g.payMethod||'',discount,
      items,totalAmount,totalCost,totalProfit:totalAmount-totalCost};
    if(ex)Object.assign(ex,data); else DB.orders.unshift({id:uid('or'),...data});
  });
}
function fmtDate(v){ if(!v)return today();
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v); if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
  const s=String(v).trim(); const d=new Date(s); return isNaN(d)?today():d.toISOString().slice(0,10);
}
function exportExcel(type){
  const wb=XLSX.utils.book_new();
  if(type==='customers'||type==='all'){
    const cs=customerStats().sort((a,b)=>b.profit-a.profit).map(c=>({客户名称:c.name,电话:c.phone,公司:c.company,
      行业:c.industry||'',地区:c.region||'',来源:c.source||'',付款习惯:c.payHabit||'',
      负责销售:(byId(DB.salespersons,c.salespersonId)||{}).name||'',等级:tierName[c.tier],总销售额:R(c.sales),总利润:R(c.profit),订单数:c.count,最近购买:c.last||''}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cs),'客户利润');
  }
  if(type==='products'||type==='all'){
    const ps=productStats().sort((a,b)=>b.profit-a.profit).map(p=>({SKU:p.sku,产品名称:p.name,
      分类:(byId(DB.categories,p.categoryId)||{}).name||'',品牌供应商:p.brand||'',单位:p.unit||'',成本:p.cost,售价:p.price,销量:p.qty,销售额:R(p.sales),利润:R(p.profit),利润率:(p.margin*100).toFixed(1)+'%',
      当前库存:p.stock,安全库存:p.safety,库存价值:R(p.stockValue),状态:p.outOfStock?'缺货':p.lowStock?'低库存':p.lowProfit?'低利润':p.slow?'滞销':'正常'}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ps),'产品利润');
  }
  if(type==='inventory'||type==='all'){
    const pur=(DB.purchases||[]).slice().sort((a,b)=>a.date<b.date?1:-1).map(pu=>{const p=byId(DB.products,pu.productId);
      return {date:pu.date,product:p?p.name:'',qty:pu.qty,unitCost:pu.unitCost,金额:R(pu.qty*pu.unitCost),supplier:pu.supplier||'',note:pu.note||''};});
    if(pur.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(pur),'进货记录');
  }
  if(type==='all'){
    const ts=salespersonStats().sort((a,b)=>b.profit-a.profit).map(s=>({销售员:s.name,销售额:R(s.sales),利润:R(s.profit),订单数:s.orders,客户数:s.customers}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ts),'销售员业绩');
    ['region','industry','source'].forEach(f=>{const lab={region:'地区',industry:'行业',source:'来源'}[f];
      const rows=aggBy(f).filter(x=>x.key!=='未分类').map(x=>({[lab]:x.key,客户数:x.custs,订单数:x.orders,总销售额:R(x.sales),总利润:R(x.profit),平均每户利润:R(x.custs?x.profit/x.custs:0)}));
      if(rows.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),lab+'分析');});
  }
  if(type==='orders'||type==='all'){
    const rows=[]; DB.orders.forEach(o=>{const c=byId(DB.customers,o.customerId),s=byId(DB.salespersons,o.salespersonId);
      o.items.forEach(it=>{const p=byId(DB.products,it.productId);
        rows.push({orderNo:o.orderNo,date:o.date,customer:c?c.name:'',salesperson:s?s.name:'',channel:o.channel||'',payMethod:o.payMethod||'',
          product:p?p.name:'',qty:it.qty,unitPrice:it.unitPrice,unitCost:it.unitCost,discount:o.discount||0,小计利润:R(it.qty*(it.unitPrice-it.unitCost))});});});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'订单明细');
  }
  if(type==='all'){
    const ex=(DB.expenses||[]).slice().sort((a,b)=>a.date<b.date?1:-1).map(e=>({date:e.date,category:e.category,amount:e.amount,note:e.note||''}));
    if(ex.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ex),'营运开销');
    const rt=(DB.returns||[]).slice().sort((a,b)=>a.date<b.date?1:-1).map(r=>{const p=byId(DB.products,r.productId),c=byId(DB.customers,r.customerId);
      return {date:r.date,product:p?p.name:'',customer:c?c.name:'',qty:r.qty,unitPrice:r.unitPrice,unitCost:r.unitCost,退款额:R(r.qty*r.unitPrice),reason:r.reason||''};});
    if(rt.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rt),'退货记录');
  }
  XLSX.writeFile(wb,`ProRadar_${type}_${today()}.xlsx`); toast('Excel 已导出');
}

function barOpts(horizontal,legend){return{responsive:true,maintainAspectRatio:false,indexAxis:horizontal?'y':'x',
  plugins:{legend:{display:!!legend,labels:{font:{family:'Noto Sans SC',size:11},usePointStyle:true}},
    tooltip:{callbacks:{label:c=>(c.dataset.label?c.dataset.label+': ':'')+'RM '+c.parsed[horizontal?'x':'y'].toLocaleString()}}},
  scales:{[horizontal?'x':'y']:{beginAtZero:true,ticks:{font:{family:'JetBrains Mono',size:10},callback:v=>v>=1000?(v/1000)+'k':v},grid:{color:gridCol()}},
    [horizontal?'y':'x']:{ticks:{font:{family:'Noto Sans SC',size:11}},grid:{display:false}}}};}

/* ==================== confirm box ==================== */
function confirmBox(msg,onYes){
  openModal('请确认',`<div style="font-size:14px;line-height:1.7">${msg}</div>`,
    `<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn danger" id="cfYes">确定</button>`);
  document.getElementById('cfYes').onclick=()=>{closeModal();onYes();};
}

/* ==================== refresh hooks per view ==================== */
const _origRender=render;
render=function(id){ _origRender(id);
  if(id==='customers')refreshCust();
  if(id==='products')refreshProd();
  if(id==='orders')refreshOrders();
};

load();
applyTheme();
if(!DB.settings.gateOn){ enterApp(); }
else { document.getElementById('login').style.display='flex'; setTimeout(()=>document.getElementById('pw').focus(),300); }
