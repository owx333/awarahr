<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ProRadar™ 盈利导航系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0A1120; --navy2:#0E1729; --panel:#101A2E; --line:rgba(255,255,255,.07);
  --ink:#E9EEF8; --bg:#070C18; --card:#101A2E; --muted:#93A4C0; --soft:rgba(255,255,255,.06);
  --orange:#E0935A; --lime:#5FC08A; --pink:#E87FA8; --yellow:#E6C260; --sky:#5B8DEF; --teal:#3FC8C0;
  --border:rgba(255,255,255,.09); --shadow:0 14px 40px rgba(0,0,0,.45);
  --r:16px; --brand:linear-gradient(135deg,#5B8DEF,#6FD3E8);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Noto Sans SC','Sora',system-ui,sans-serif;color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;
  background:
   radial-gradient(1100px 680px at 82% -8%, rgba(91,141,239,.14), transparent 60%),
   radial-gradient(900px 620px at -5% 110%, rgba(63,200,192,.08), transparent 55%),
   url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUAAAAFACAYAAADNkKWqAAADc0lEQVR42u3az4ocVRjG4fcMQhaZiUGCEzEGcVYqaiAQZ/BfwOsIxJUX4N47DWRhdiImM1mELF43tQlG6Q49PV3Vz7P5Nk0X/Kr61DnQycK0/T0AAAAAAAAAsDhtz1QAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAICd1/ZDFQAAAAAAAGAVbR+qAPzPGnGmAgAALGV7/6sK/Mezca3tYdtramzekAB2egE8THKU5HyMcaHIZr13yTfv/SSHSS7GGM/lhrW9TnI+TTbs4JK//zDJx9ME1j2ijfFqjHExxnilxo7vANveTHI9ycsxxt9JLpI8mybAoneA15PcmWbGGM/HGM8cf4F9WABfJvljmgAAAAAAAAAAAAAAAAAAALPR9lQFAAAAAAAAAAAAVtT2WAUAAAAAuFptv1cBAAAAAACYvbZfqwAAAAAAAAAAAADA4rT9YcXP+UMtAAAAAAAAADum7S8qAMBb3pBfqQAAAAAAACxS289UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAmJ22H6kAAAAAAAAAAAAAAAAAAAAAAACL1/ZUBQAAAAAAAAAAAAAAgLloe0sFAAAAAAAAAAAAAHZd229UAAAAAABgLW1/VmGR9/W2CgAAAAAAAAAAAAAAAAAAAMClanumwsqtHqoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAa2h7ogIAvOUNeawCAAAAzOEI/60KAAAAAADra/uJCgAAAGz2qPmFCgAAAAD/0vY3FWB+P9zHKgAAs93J3FcBAAAWtMN/pAIAAAAAAAAAAAAAafulCmzweTpRAQAAAAAAAAAAAAAAAAAAAAAAAAAAYI+MbV2o7a0kN5K8GGP8KT1w1Q62eK0bSU6mCbBXC+CLJE+mCQDALLS9qwIAAAAAAAAAzF3bH1UAAAAAAAAAAAAAAAAAAIA3tX2gAgAAAAAAAAAAACRt76oAAAAAAAAAAO+q7ecqAAAAAAAAALur7WMVAAAWvuM7VQEAAAAAAADgMrU9VgEAAIDVDQnYprYfJDlKcj7G+EsRrtKBBGzZUZJPpwkWQPbKeZKn04S9PxJ9pwIAwGY3WHdUAAAAAAAAgG1oe08FAAAAAAAAAAAAAGDvtT1TAQAAgOUddx+pAAAAAAAAAAAAAADAG9r+pAIAAAAswj8SidB5iMXpGgAAAABJRU5ErkJggg==') repeat,
   linear-gradient(180deg,#070C18,#0A1322);
  background-attachment:fixed,fixed,fixed,fixed}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
.dsp{font-family:'Sora','Noto Sans SC',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}

#login{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:
   radial-gradient(1000px 560px at 50% -10%, rgba(91,141,239,.18), transparent 60%),
   url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUAAAAFACAYAAADNkKWqAAADc0lEQVR42u3az4ocVRjG4fcMQhaZiUGCEzEGcVYqaiAQZ/BfwOsIxJUX4N47DWRhdiImM1mELF43tQlG6Q49PV3Vz7P5Nk0X/Kr61DnQycK0/T0AAAAAAAAAsDhtz1QAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAICd1/ZDFQAAAAAAAGAVbR+qAPzPGnGmAgAALGV7/6sK/Mezca3tYdtramzekAB2egE8THKU5HyMcaHIZr13yTfv/SSHSS7GGM/lhrW9TnI+TTbs4JK//zDJx9ME1j2ijfFqjHExxnilxo7vANveTHI9ycsxxt9JLpI8mybAoneA15PcmWbGGM/HGM8cf4F9WABfJvljmgAAAAAAAAAAAAAAAAAAALPR9lQFAAAAAAAAAAAAVtT2WAUAAAAAuFptv1cBAAAAAACYvbZfqwAAAAAAAAAAAADA4rT9YcXP+UMtAAAAAAAAADum7S8qAMBb3pBfqQAAAAAAACxS289UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAmJ22H6kAAAAAAAAAAAAAAAAAAAAAAACL1/ZUBQAAAAAAAAAAAAAAgLloe0sFAAAAAAAAAAAAAHZd229UAAAAAABgLW1/VmGR9/W2CgAAAAAAAAAAAAAAAAAAAMClanumwsqtHqoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAa2h7ogIAvOUNeawCAAAAzOEI/60KAAAAAADra/uJCgAAAGz2qPmFCgAAAAD/0vY3FWB+P9zHKgAAs93J3FcBAAAWtMN/pAIAAAAAAAAAAAAAafulCmzweTpRAQAAAAAAAAAAAAAAAAAAAAAAAAAAYI+MbV2o7a0kN5K8GGP8KT1w1Q62eK0bSU6mCbBXC+CLJE+mCQDALLS9qwIAAAAAAAAAzF3bH1UAAAAAAAAAAAAAAAAAAIA3tX2gAgAAAAAAAAAAACRt76oAAAAAAAAAAO+q7ecqAAAAAAAAALur7WMVAAAWvuM7VQEAAAAAAADgMrU9VgEAAIDVDQnYprYfJDlKcj7G+EsRrtKBBGzZUZJPpwkWQPbKeZKn04S9PxJ9pwIAwGY3WHdUAAAAAAAAgG1oe08FAAAAAAAAAAAAAGDvtT1TAQAAgOUddx+pAAAAAAAAAAAAAADAG9r+pAIAAAAswj8SidB5iMXpGgAAAABJRU5ErkJggg==') repeat,
   linear-gradient(160deg,#070C18,#0A1322 60%,#070C18)}
.radar-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.6}
.radar-bg .ring{position:absolute;border:1px solid rgba(91,141,239,.12);border-radius:50%}
.radar-sweep{position:absolute;width:560px;height:560px;border-radius:50%;
  background:conic-gradient(from 0deg, rgba(91,141,239,.20), transparent 28%);animation:sweep 6s linear infinite}
@keyframes sweep{to{transform:rotate(360deg)}}
.login-card{position:relative;width:344px;max-width:88vw;background:rgba(16,26,46,.72);backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:36px 30px 30px;text-align:center;
  box-shadow:0 30px 90px rgba(0,0,0,.55)}
.brand{display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.brand .dot{background:none;display:flex;align-items:center;justify-content:center}
.brand .dot img{height:60px;width:auto;filter:drop-shadow(0 4px 16px rgba(91,141,239,.5))}
.login-card h1{color:#fff;font-family:'Sora';font-size:24px;font-weight:800;letter-spacing:.5px}
.login-card .sub{color:#8094b5;font-size:11px;margin-top:5px;letter-spacing:4px}
.login-card .tag{color:#8FB2F5;font-size:12px;margin:14px 0 22px}
.login-card input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  color:#fff;padding:13px 16px;border-radius:12px;text-align:center;letter-spacing:6px;font-size:18px;outline:none}
.login-card input:focus{border-color:#5B8DEF;box-shadow:0 0 0 3px rgba(91,141,239,.18)}
.login-card button{width:100%;margin-top:16px;background:var(--brand);color:#06101F;font-weight:700;
  padding:13px;border-radius:12px;font-size:15px;font-family:'Sora'}
.login-err{color:#F2888C;font-size:12px;height:16px;margin-top:10px}

#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;background:linear-gradient(180deg,rgba(12,19,36,.92),rgba(10,17,32,.96));
  border-right:1px solid var(--border);backdrop-filter:blur(10px);color:#cdd8ea;
  display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:60;transition:transform .25s}
.sb-head{padding:18px 18px 14px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--line)}
.sb-head .dot{background:none;display:flex;align-items:center;justify-content:center}
.sb-head .dot img{height:30px;width:auto;filter:drop-shadow(0 2px 8px rgba(91,141,239,.45))}
.sb-head .nm{font-family:'Sora';font-weight:800;color:#fff;font-size:16px;line-height:1}
.sb-head .nm small{display:block;font-weight:400;color:#6f82a3;font-size:10px;letter-spacing:2px;margin-top:3px}
.nav{flex:1;padding:12px;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;color:#9fb0cd;
  font-size:13.5px;font-weight:500;margin-bottom:3px;text-decoration:none;transition:.15s;cursor:pointer}
.nav a .ic{width:18px;text-align:center;font-size:15px}
.nav a:hover{background:rgba(255,255,255,.05);color:#fff}
.nav a.on{background:linear-gradient(135deg,rgba(91,141,239,.22),rgba(63,200,192,.10));color:#fff;
  box-shadow:inset 2px 0 0 #5B8DEF}
.sb-foot{padding:14px 16px;border-top:1px solid var(--line);font-size:11px;color:#6f82a3}
.sb-foot button{color:#9fb0cd;font-size:12px;padding:6px 0}
.main{flex:1;margin-left:230px;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:rgba(10,17,32,.72);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 26px;display:flex;align-items:center;gap:14px}
.topbar h2{font-family:'Sora';font-size:19px;font-weight:700;color:#fff}
.topbar .crumb{color:var(--muted);font-size:12px}
.topbar .spacer{flex:1}
.hamb{display:none;font-size:22px;color:var(--ink)}
.sync-pill{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);
  background:rgba(255,255,255,.05);border:1px solid var(--border);padding:7px 13px;border-radius:30px;cursor:pointer}
.sync-pill .led{width:8px;height:8px;border-radius:50%;background:#56688a}
.sync-pill.live .led{background:#3FC8C0;box-shadow:0 0 0 3px rgba(63,200,192,.22)}
.content{padding:22px 26px 60px;max-width:1400px;width:100%}
.view{display:none;animation:fade .3s}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.btn{display:inline-flex;align-items:center;gap:7px;background:var(--brand);color:#06101F;padding:10px 16px;
  border-radius:11px;font-weight:700;font-size:13px;transition:.15s;box-shadow:0 6px 18px rgba(91,141,239,.25)}
.btn:hover{filter:brightness(1.08)}
.btn.gold{background:var(--brand);color:#06101F}
.btn.ghost{background:rgba(255,255,255,.05);color:var(--ink);border:1px solid var(--border);box-shadow:none}
.btn.sm{padding:7px 12px;font-size:12px;border-radius:9px}
.btn.danger{background:#E5848A;color:#1a0b0c;box-shadow:none}
.icbtn{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.05);color:var(--muted);
  display:inline-flex;align-items:center;justify-content:center;font-size:14px;border:1px solid var(--border)}
.icbtn:hover{background:rgba(255,255,255,.12);color:#fff}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kpi{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:1px solid var(--border);
  border-radius:var(--r);padding:18px;position:relative;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(8px)}
.kpi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi.c1::before{background:#5B8DEF}.kpi.c2::before{background:#3FC8C0}
.kpi.c3::before{background:#E0935A}.kpi.c4::before{background:#E87FA8}
.kpi .lbl{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px;font-weight:500}
.kpi .val{font-family:'JetBrains Mono';font-size:26px;font-weight:700;margin-top:8px;color:#fff;letter-spacing:-.5px}
.kpi .delta{font-size:11px;margin-top:5px;font-weight:600;color:var(--muted)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px}
.card{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018));border:1px solid var(--border);
  border-radius:var(--r);padding:18px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}
.card h3{font-family:'Sora';font-size:15px;font-weight:700;margin-bottom:2px;display:flex;align-items:center;gap:8px;color:#fff}
.card .csub{font-size:11.5px;color:var(--muted);margin-bottom:14px}
.card .chwrap{position:relative;height:240px}
.card .chwrap.sm{height:210px}

.tablewrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,.015)}
table{width:100%;border-collapse:collapse;font-size:13px;background:transparent;color:var(--ink)}
thead th{background:rgba(255,255,255,.04);color:var(--muted);font-weight:600;text-align:left;padding:11px 14px;
  font-size:11.5px;letter-spacing:.3px;white-space:nowrap;border-bottom:1px solid var(--border)}
tbody td{padding:11px 14px;border-top:1px solid rgba(255,255,255,.06);white-space:nowrap}
tbody tr:hover{background:rgba(255,255,255,.035)}
td.num,th.num{text-align:right;font-family:'JetBrains Mono'}
.tag2{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:30px;font-size:11px;font-weight:600}
.tag2.vip{background:rgba(230,194,96,.16);color:#EBCB6E}
.tag2.active{background:rgba(63,200,192,.16);color:#5FD3C9}
.tag2.potential{background:rgba(91,141,239,.16);color:#8FB2F5}
.tag2.risk{background:rgba(224,147,90,.18);color:#F0A878}
.tag2.lost{background:rgba(229,132,138,.16);color:#F0989C}
.tag2.gray{background:rgba(255,255,255,.07);color:#93A4C0}
.tag2.lo{background:rgba(229,132,138,.16);color:#F0989C}
.tag2.slow{background:rgba(230,194,96,.16);color:#EBCB6E}
.tag2.ok{background:rgba(95,192,138,.16);color:#7FD3A0}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input[type=text],.toolbar select{background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--ink);padding:9px 13px;border-radius:10px;outline:none;min-width:150px}
.toolbar input::placeholder{color:#6f82a3}
.toolbar input:focus,.toolbar select:focus{border-color:#5B8DEF}
.toolbar .spacer{flex:1}
.toolbar select option{background:#101A2E;color:var(--ink)}

.section-title{font-family:'Sora';font-size:14px;font-weight:700;margin:22px 0 12px;color:#fff;display:flex;align-items:center;gap:8px}
.rankrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rankrow:last-child{border-bottom:none}
.rankrow .rk{width:22px;height:22px;border-radius:7px;background:rgba(255,255,255,.07);color:var(--muted);
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rankrow .rk.g1{background:#E6C260;color:#0E1729}.rankrow .rk.g2{background:#A9B6CE;color:#0E1729}.rankrow .rk.g3{background:#C98F5E;color:#0E1729}
.rankrow .rnm{flex:1;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rankrow .rval{font-family:'JetBrains Mono';font-weight:600;font-size:12.5px;width:104px;text-align:right;color:#fff}

.modal{position:fixed;inset:0;z-index:200;background:rgba(3,7,15,.7);backdrop-filter:blur(4px);
  display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal.on{display:flex}
.modal-card{background:#111B30;border:1px solid var(--border);border-radius:18px;width:580px;max-width:100%;
  box-shadow:0 30px 90px rgba(0,0,0,.6);animation:pop .25s}
@keyframes pop{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-head h3{font-family:'Sora';font-size:17px;font-weight:700;flex:1;color:#fff}
.modal-body{padding:22px;max-height:64vh;overflow-y:auto}
.modal-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--ink);padding:10px 12px;border-radius:10px;outline:none}
.field input:focus,.field select:focus{border-color:#5B8DEF}
.field select option{background:#111B30;color:var(--ink)}
.field details summary{color:var(--muted)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.lineitem{display:grid;grid-template-columns:2.2fr .8fr 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.lineitem input,.lineitem select{padding:8px 10px}
.order-sum{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:12px;display:flex;justify-content:space-around;text-align:center}
.order-sum div span{display:block;font-size:11px;color:var(--muted)}
.order-sum div b{font-family:'JetBrains Mono';font-size:17px;color:#fff}

.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .big{font-size:40px;margin-bottom:10px;opacity:.4}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;
  background:#1b2740;border:1px solid var(--border);color:#fff;padding:12px 22px;border-radius:30px;font-size:13px;font-weight:500;
  box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transition:.3s}
.toast.show{transform:translateX(-50%);opacity:1}
.note{background:rgba(91,141,239,.12);border:1px solid rgba(91,141,239,.28);border-radius:12px;padding:14px 16px;
  font-size:12.5px;color:#cfe0ff;margin-bottom:16px;line-height:1.6}
.note code{background:rgba(255,255,255,.08);padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono';font-size:11.5px;color:#bcd2ff}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);gap:16px;flex-wrap:wrap}
.setrow:last-child{border-bottom:none}
.setrow .l b{display:block;font-size:13.5px;font-weight:600;color:var(--ink)}
.setrow .l span{font-size:12px;color:var(--muted)}
.setrow input{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--ink)}
.switch{width:46px;height:26px;border-radius:30px;background:rgba(255,255,255,.14);position:relative;transition:.2s;flex-shrink:0;cursor:pointer}
.switch.on{background:#3FC8C0}
.switch i{position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on i{left:23px}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:5px 8px 5px 11px;border-radius:30px;font-size:12px;color:var(--ink)}
.chip button{background:rgba(255,255,255,.08);color:var(--muted);width:18px;height:18px;border-radius:50%;font-size:13px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.chip button:hover{background:#E5848A;color:#1a0b0c}
.chip.addchip{padding:3px 4px 3px 10px;background:rgba(91,141,239,.12);border-color:rgba(91,141,239,.3)}
.chip.addchip input{background:none;border:none;outline:none;color:var(--ink);width:78px;font-size:12px}
.chip.addchip input::placeholder{color:#8FB2F5}
.chip.addchip button{background:var(--brand);color:#06101F;font-weight:700;width:auto;height:auto;padding:3px 9px;border-radius:20px;font-size:11px}

@media(max-width:980px){.kpis{grid-template-columns:1fr 1fr}.grid2,.grid3{grid-template-columns:1fr}}
@media(max-width:760px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}
  .main{margin-left:0}.hamb{display:block}
  .content{padding:16px 14px 60px}.topbar{padding:12px 16px}.topbar h2{font-size:16px}
  .kpis{gap:11px}.kpi .val{font-size:21px}
  .lineitem{grid-template-columns:1fr 1fr;gap:6px}
  .sb-mask.on{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
}

    ['伟业钢铁','011-99887766','伟业钢铁','sp1','制造业','雪兰莪','电话开发','偶尔拖延'],
    ['星辰科技','018-1234567','星辰科技','sp3','科技/IT','吉隆坡','Facebook','正常'],
    ['大众电器行','019-8765432','大众电器','sp5','零售','吉打','走进店面','经常拖欠'],
  ];
  const customers=custDefs.map((c,i)=>({id:'cu'+(i+1),name:c[0],phone:c[1],company:c[2],
    ssm:'SSM'+(2010+i)+(100+i),sst:'',taxNo:'',salespersonId:c[3],
    industry:c[4]||'',region:c[5]||'',source:c[6]||'',payHabit:c[7]||'正常',
    createdAt:offsetDate(-(200-i*8))}));

  // orders spread over last ~210 days
  const orders=[]; let oc=1;
  const rng=mulberry(20260101);
  // give each customer a "profile" so RFM looks varied
  customers.forEach((cu,ci)=>{
    let nOrders;
    if(ci<3) nOrders=6+Math.floor(rng()*4);        // heavy buyers
    else if(ci<7) nOrders=3+Math.floor(rng()*3);   // active
    else if(ci<10) nOrders=1+Math.floor(rng()*2);  // potential/light
    else nOrders=Math.floor(rng()*3);              // some lapsed / lost
    let lastDay = ci>=10 ? -(110+Math.floor(rng()*90)) : -(2+Math.floor(rng()*70)); // lost = old last order
    for(let k=0;k<nOrders;k++){
      const day = lastDay - k*(15+Math.floor(rng()*30));
      if(day < -210) break;
      const nItems=1+Math.floor(rng()*3);
      const items=[]; const used={};
      for(let it=0;it<nItems;it++){
        let p; do{ p=products[Math.floor(rng()*products.length)]; }while(used[p.id]&&Object.keys(used).length<products.length);
        used[p.id]=1;
        const qty=1+Math.floor(rng()*8);
        items.push({productId:p.id,qty,unitPrice:p.price,unitCost:p.cost});
      }
      const gross=items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
      const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
      const discount = rng()<0.35 ? Math.round(gross*(0.03+rng()*0.07)) : 0;
      const totalAmount=gross-discount;
      const payMethod=PAYMETHODS[Math.floor(rng()*4)];
      const channel=CHANNELS[Math.floor(rng()*CHANNELS.length)];
      orders.push({id:'or'+(oc),orderNo:'PO-'+String(26000+oc),customerId:cu.id,
        salespersonId:cu.salespersonId,date:offsetDate(day),items,discount,payMethod,channel,
        totalAmount,totalCost,totalProfit:totalAmount-totalCost});
      oc++;
    }
  });
  orders.sort((a,b)=>a.date<b.date?1:-1);
  DB={categories:cats,products,customers,salespersons:sps,orders,
    settings:{password:'8888',gateOn:true,sheetId:'',sheetTabs:{customers:'customers',products:'products',orders:'orders'}}};
  save();
}
function offsetDate(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function mulberry(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
/* ---------- Computations ---------- */
function customerStats(){
  const map={};
  DB.customers.forEach(c=> map[c.id]={...c,sales:0,profit:0,count:0,last:null});
  DB.orders.forEach(o=>{
    const m=map[o.customerId]; if(!m)return;
    m.sales+=o.totalAmount; m.profit+=o.totalProfit; m.count++;
    if(!m.last||o.date>m.last) m.last=o.date;
  });
  const arr=Object.values(map);
  // RFM tiering
  const active=arr.filter(c=>c.count>0);
  const profits=active.map(c=>c.profit).sort((a,b)=>b-a);
  const topProfit = profits.length? profits[Math.floor(profits.length*0.25)] : 0;
  const td=today();
  arr.forEach(c=>{
    if(c.count===0){ c.tier='potential'; c.recency=null; return; }
    const rec=daysBetween(c.last,td); c.recency=rec;
    if(rec>180) c.tier='lost';
    else if(rec>90) c.tier='risk';
    else {
      if(c.count>=3 && c.profit>=topProfit) c.tier='vip';
      else if(c.count>=2) c.tier='active';
      else c.tier='potential';
    }
  });
  return arr;
}
function productStats(){
  const map={};
  DB.products.forEach(p=> map[p.id]={...p,qty:0,sales:0,profit:0,orders:0,last:null});
  DB.orders.forEach(o=> o.items.forEach(it=>{
    const m=map[it.productId]; if(!m)return;
    m.qty+=it.qty; m.sales+=it.qty*it.unitPrice; m.profit+=it.qty*(it.unitPrice-it.unitCost); m.orders++;
    if(!m.last||o.date>m.last)m.last=o.date;
  }));
  const arr=Object.values(map);
  const td=today();
  arr.forEach(p=>{
    p.margin = p.sales>0 ? p.profit/p.sales : (p.price>0?(p.price-p.cost)/p.price:0);
    p.recency = p.last? daysBetween(p.last,td):null;
    p.lowProfit = p.margin>0 && p.margin<0.20;
    p.slow = p.qty===0 || (p.recency!=null && p.recency>120);
  });
  return arr;
}
function salespersonStats(){
  const map={};
  DB.salespersons.forEach(s=> map[s.id]={...s,sales:0,profit:0,orders:0,custs:new Set()});
  DB.orders.forEach(o=>{
    const m=map[o.salespersonId]; if(!m)return;
    m.sales+=o.totalAmount; m.profit+=o.totalProfit; m.orders++; m.custs.add(o.customerId);
  });
  return Object.values(map).map(s=>({...s,customers:s.custs.size}));
}
function totals(){
  const rev=DB.orders.reduce((s,o)=>s+o.totalAmount,0);
  const pft=DB.orders.reduce((s,o)=>s+o.totalProfit,0);
  return {rev,pft,custs:DB.customers.length,prods:DB.products.length,
    margin: rev>0?pft/rev:0, orders:DB.orders.length};
}
function monthlyTrend(months=6){
  const td=new Date(); const labels=[],sales=[],profit=[];
  const buckets={};
  for(let i=months-1;i>=0;i--){
    const d=new Date(td.getFullYear(),td.getMonth()-i,1);
    const k=d.toISOString().slice(0,7);
    buckets[k]={s:0,p:0}; labels.push((d.getMonth()+1)+'月');
  }
  DB.orders.forEach(o=>{ const k=ym(o.date); if(buckets[k]){buckets[k].s+=o.totalAmount;buckets[k].p+=o.totalProfit;} });
  Object.keys(buckets).forEach(k=>{ sales.push(R(buckets[k].s)); profit.push(R(buckets[k].p)); });
  return {labels,sales,profit};
}

  box.innerHTML=_items.map((it,i)=>`<div class="lineitem">

  const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
  const discount=+document.getElementById('o_disc').value||0;

    items,totalAmount,totalCost,totalProfit:totalAmount-totalCost};

    m[k].sales+=c.sales;m[k].profit+=c.profit;m[k].custs++;m[k].orders+=c.count;});

  out.push(`前 3 大客户占总利润的 <b>${pct(top3/allP)}</b>${top3/allP>0.5?'，利润集中度偏高，需注意客户依赖风险。':'。'}`);
  if(ps[0])out.push(`最赚钱产品是 <b>${esc(ps[0].name)}</b>，利润 <b>${money(ps[0].profit)}</b>。`);
  const risk=customerStats().filter(c=>c.tier==='risk'||c.tier==='lost');

}

/* ==================== GOOGLE SHEET SYNC ==================== */
function gvizUrl(tab){ return `https://docs.google.com/spreadsheets/d/${DB.settings.sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`; }
async function syncSheet(){
  if(!DB.settings.sheetId){toast('请先填写 Google Sheet ID');return;}
  toast('正在从 Google Sheet 同步…');
  try{
    const [cRows,pRows,oRows]=await Promise.all([
      fetchCsv(gvizUrl(DB.settings.sheetTabs.customers)).catch(()=>null),
      fetchCsv(gvizUrl(DB.settings.sheetTabs.products)).catch(()=>null),
      fetchCsv(gvizUrl(DB.settings.sheetTabs.orders)).catch(()=>null),
    ]);
    if(pRows) ingestProducts(pRows);
    if(cRows) ingestCustomers(cRows);
    if(oRows) ingestOrders(oRows);
    save();updateSyncPill();go(curView);toast('同步完成 ✓');
  }catch(e){ toast('同步失败：请确认表格已公开且 ID 正确'); }
}
async function fetchCsv(url){
  const r=await fetch(url); if(!r.ok)throw 0; const txt=await r.text();
  const wb=XLSX.read(txt,{type:'string'}); const ws=wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(ws,{defval:''});
}

/* ==================== EXCEL IMPORT / EXPORT ==================== */
function importExcel(ev,type){
  const file=ev.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!rows.length){toast('文件为空');return;}
      if(type==='customers')ingestCustomers(rows);
      if(type==='products')ingestProducts(rows);
      if(type==='orders')ingestOrders(rows);
      save();go(curView);toast(`已导入 ${rows.length} 行`);
    }catch(err){toast('导入失败：请检查文件格式');}
  };
  rd.readAsArrayBuffer(file); ev.target.value='';
}
function gv(row,keys){ for(const k of keys){ for(const rk in row){ if(rk.toLowerCase().trim()===k)return row[rk]; } } return ''; }
function ingestProducts(rows){
  rows.forEach(r=>{
    const sku=String(gv(r,['sku'])).trim(); const name=String(gv(r,['name','产品名称','产品'])).trim();
    if(!sku&&!name)return;
    let p=DB.products.find(x=>x.sku===sku);
    const catName=String(gv(r,['category','分类'])).trim();
    let catId=''; if(catName){let c=DB.categories.find(x=>x.name===catName); if(!c){c={id:uid('cat'),name:catName};DB.categories.push(c);} catId=c.id;}
    const data={sku,name,categoryId:catId,brand:String(gv(r,['brand','品牌','supplier','供应商'])).trim(),
      unit:String(gv(r,['unit','单位'])).trim()||'pcs',cost:+gv(r,['cost','成本'])||0,price:+gv(r,['price','售价'])||0};
    if(p)Object.assign(p,data); else DB.products.push({id:uid('pr'),...data});
  });
}
function ingestCustomers(rows){
  rows.forEach(r=>{
    const name=String(gv(r,['name','客户名称','客户'])).trim(); if(!name)return;
    let c=DB.customers.find(x=>x.name===name);
    const spName=String(gv(r,['salesperson','负责销售','销售员'])).trim();
    let spId=''; if(spName){let s=DB.salespersons.find(x=>x.name===spName); if(!s){s={id:uid('sp'),name:spName,role:'sales'};DB.salespersons.push(s);} spId=s.id;}
    const data={name,phone:String(gv(r,['phone','电话'])).trim(),company:String(gv(r,['company','公司'])).trim(),
      industry:String(gv(r,['industry','行业','类别'])).trim(),region:String(gv(r,['region','state','州属','地区'])).trim(),
      source:String(gv(r,['source','来源','客户来源'])).trim(),payHabit:String(gv(r,['payhabit','付款习惯','信用'])).trim()||'正常',
      ssm:String(gv(r,['ssm'])).trim(),sst:String(gv(r,['sst'])).trim(),taxNo:String(gv(r,['taxno','tax','税务号'])).trim(),salespersonId:spId};
    if(c)Object.assign(c,data); else DB.customers.push({id:uid('cu'),createdAt:today(),...data});
  });
}
function ingestOrders(rows){
  const groups={};
  rows.forEach(r=>{
    const no=String(gv(r,['orderno','order','订单号'])).trim(); if(!no)return;
    if(!groups[no])groups[no]={orderNo:no,date:fmtDate(gv(r,['date','日期'])),
      customer:String(gv(r,['customer','客户'])).trim(),salesperson:String(gv(r,['salesperson','销售员'])).trim(),
      channel:String(gv(r,['channel','渠道','销售渠道'])).trim(),payMethod:String(gv(r,['paymethod','付款方式'])).trim(),
      discount:+gv(r,['discount','折扣'])||0,items:[]};
    const pname=String(gv(r,['product','产品','sku'])).trim(); if(!pname)return;
    let p=DB.products.find(x=>x.name===pname||x.sku===pname);
    groups[no].items.push({product:pname,pid:p?p.id:'',qty:+gv(r,['qty','数量'])||1,
      unitPrice:+gv(r,['unitprice','单价'])|| (p?p.price:0), unitCost:+gv(r,['unitcost','成本'])||(p?p.cost:0)});
  });
  Object.values(groups).forEach(g=>{
    let cust=DB.customers.find(x=>x.name===g.customer);
    if(!cust&&g.customer){cust={id:uid('cu'),name:g.customer,phone:'',company:'',salespersonId:'',createdAt:today()};DB.customers.push(cust);}
    let sp=DB.salespersons.find(x=>x.name===g.salesperson);
    if(!sp&&g.salesperson){sp={id:uid('sp'),name:g.salesperson,role:'sales'};DB.salespersons.push(sp);}
    const items=g.items.map(i=>({productId:i.pid,qty:i.qty,unitPrice:i.unitPrice,unitCost:i.unitCost}));
    const gross=items.reduce((s,i)=>s+i.qty*i.unitPrice,0);
    const totalCost=items.reduce((s,i)=>s+i.qty*i.unitCost,0);
    const discount=g.discount||0; const totalAmount=gross-discount;
    let ex=DB.orders.find(o=>o.orderNo===g.orderNo);
    const data={orderNo:g.orderNo,date:g.date||today(),customerId:cust?cust.id:'',salespersonId:sp?sp.id:(cust?cust.salespersonId:''),
      channel:g.channel||'',payMethod:g.payMethod||'',discount,
      items,totalAmount,totalCost,totalProfit:totalAmount-totalCost};
    if(ex)Object.assign(ex,data); else DB.orders.unshift({id:uid('or'),...data});
  });
}
function fmtDate(v){ if(!v)return today();
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v); if(d)return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
  const s=String(v).trim(); const d=new Date(s); return isNaN(d)?today():d.toISOString().slice(0,10);
}
function exportExcel(type){
  const wb=XLSX.utils.book_new();
  if(type==='customers'||type==='all'){
    const cs=customerStats().sort((a,b)=>b.profit-a.profit).map(c=>({客户名称:c.name,电话:c.phone,公司:c.company,
      行业:c.industry||'',地区:c.region||'',来源:c.source||'',付款习惯:c.payHabit||'',
      负责销售:(byId(DB.salespersons,c.salespersonId)||{}).name||'',等级:tierName[c.tier],总销售额:R(c.sales),总利润:R(c.profit),订单数:c.count,最近购买:c.last||''}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cs),'客户利润');
  }
  if(type==='products'||type==='all'){
    const ps=productStats().sort((a,b)=>b.profit-a.profit).map(p=>({SKU:p.sku,产品名称:p.name,
      分类:(byId(DB.categories,p.categoryId)||{}).name||'',品牌供应商:p.brand||'',单位:p.unit||'',成本:p.cost,售价:p.price,销量:p.qty,销售额:R(p.sales),利润:R(p.profit),利润率:(p.margin*100).toFixed(1)+'%',状态:p.lowProfit?'低利润':p.slow?'滞销':'正常'}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ps),'产品利润');
  }
  if(type==='all'){
    const ts=salespersonStats().sort((a,b)=>b.profit-a.profit).map(s=>({销售员:s.name,销售额:R(s.sales),利润:R(s.profit),订单数:s.orders,客户数:s.customers}));
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ts),'销售员业绩');
    ['region','industry','source'].forEach(f=>{const lab={region:'地区',industry:'行业',source:'来源'}[f];
      const rows=aggBy(f).filter(x=>x.key!=='未分类').map(x=>({[lab]:x.key,客户数:x.custs,订单数:x.orders,总销售额:R(x.sales),总利润:R(x.profit),平均每户利润:R(x.custs?x.profit/x.custs:0)}));
      if(rows.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),lab+'分析');});
  }
  if(type==='orders'||type==='all'){
    const rows=[]; DB.orders.forEach(o=>{const c=byId(DB.customers,o.customerId),s=byId(DB.salespersons,o.salespersonId);
      o.items.forEach(it=>{const p=byId(DB.products,it.productId);
        rows.push({orderNo:o.orderNo,date:o.date,customer:c?c.name:'',salesperson:s?s.name:'',channel:o.channel||'',payMethod:o.payMethod||'',
          product:p?p.name:'',qty:it.qty,unitPrice:it.unitPrice,unitCost:it.unitCost,discount:o.discount||0,小计利润:R(it.qty*(it.unitPrice-it.unitCost))});});});
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'订单明细');
  }
  XLSX.writeFile(wb,`ProRadar_${type}_${today()}.xlsx`); toast('Excel 已导出');
}

/* ==================== Chart option helpers ==================== */
function lineOpts(){return{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},
  plugins:{legend:{labels:{font:{family:'Noto Sans SC',size:11},usePointStyle:true,padding:14}},
    tooltip:{callbacks:{label:c=>c.dataset.label+': RM '+c.parsed.y.toLocaleString()}}},
  scales:{y:{beginAtZero:true,ticks:{font:{family:'JetBrains Mono',size:10},callback:v=>'RM '+(v>=1000?(v/1000)+'k':v)},grid:{color:'rgba(255,255,255,.07)'}},
    x:{ticks:{font:{family:'Noto Sans SC',size:11}},grid:{display:false}}}};}
function barOpts(horizontal,legend){return{responsive:true,maintainAspectRatio:false,indexAxis:horizontal?'y':'x',
  plugins:{legend:{display:!!legend,labels:{font:{family:'Noto Sans SC',size:11},usePointStyle:true}},
    tooltip:{callbacks:{label:c=>(c.dataset.label?c.dataset.label+': ':'')+'RM '+c.parsed[horizontal?'x':'y'].toLocaleString()}}},
  scales:{[horizontal?'x':'y']:{beginAtZero:true,ticks:{font:{family:'JetBrains Mono',size:10},callback:v=>v>=1000?(v/1000)+'k':v},grid:{color:'rgba(255,255,255,.07)'}},
    [horizontal?'y':'x']:{ticks:{font:{family:'Noto Sans SC',size:11}},grid:{display:false}}}};}

/* ==================== confirm box ==================== */
function confirmBox(msg,onYes){
  openModal('请确认',`<div style="font-size:14px;line-height:1.7">${msg}</div>`,
    `<button class="btn ghost" onclick="closeModal()">取消</button><button class="btn danger" id="cfYes">确定</button>`);
  document.getElementById('cfYes').onclick=()=>{closeModal();onYes();};
}

};
