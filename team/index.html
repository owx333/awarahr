<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冠尊自动发布系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --gold-dim: #C9A84C33;
    --bg: #080C14;
    --bg2: #0D1220;
    --bg3: #111827;
    --text: #E8DCC8;
    --text-dim: #888;
    --green: #2ecc71;
    --red: #e74c3c;
    --fb: #1877F2;
    --ig: #E1306C;
    --tg: #29B6D8;
    --tt: #EE1D52;
    --yt: #FF0000;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'STSong', serif;
    min-height: 100vh;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

  /* ── HEADER ── */
  #header {
    background: linear-gradient(135deg, var(--bg2), var(--bg3));
    border-bottom: 1px solid #C9A84C1A;
    padding: 18px 24px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 600px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo-box {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-weight: 700;
    color: var(--bg); font-size: 15px;
  }
  .logo-title { font-size: 14px; font-weight: 700; color: var(--gold-light); }
  .logo-sub { font-size: 10px; color: #C9A84C55; letter-spacing: 2px; }

  /* Steps */
  .steps { display: flex; align-items: center; gap: 5px; }
  .step-dot {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; transition: all .3s;
    border: 1px solid #ffffff11; background: #ffffff0D; color: #444;
  }
  .step-dot.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-color: var(--gold); color: var(--bg);
  }
  .step-dot.done { border-color: var(--green); color: var(--green); background: #2ecc7115; }
  .step-line { width: 14px; height: 1px; background: #ffffff0D; transition: background .3s; }
  .step-line.done { background: #2ecc7133; }

  /* ── BODY ── */
  #body { max-width: 600px; margin: 0 auto; padding: 32px 20px 80px; }
  .panel { animation: fadeUp .4s ease; }

  /* ── INPUTS ── */
  .label {
    font-size: 11px; color: var(--gold);
    letter-spacing: 2px; display: block; margin-bottom: 8px;
  }
  input, textarea {
    width: 100%; background: var(--bg2);
    border: 1px solid var(--gold-dim); border-radius: 8px;
    color: var(--text); padding: 11px 14px; font-size: 13px;
    font-family: inherit; outline: none;
    transition: border-color .2s;
  }
  input:focus, textarea:focus { border-color: #C9A84C88; }
  textarea { resize: vertical; line-height: 1.7; }
  .field { margin-bottom: 18px; }
  .hint { font-size: 11px; color: #444; margin-top: 4px; }

  /* ── BUTTONS ── */
  .btn-gold {
    width: 100%; padding: 14px; border-radius: 10px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border: none; color: var(--bg); font-size: 14px;
    font-weight: 700; cursor: pointer; letter-spacing: 1px;
    font-family: inherit; transition: opacity .2s;
  }
  .btn-gold:hover { opacity: .9; }
  .btn-gold:disabled {
    background: var(--gold-dim); color: #C9A84C44; cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent; border: none;
    color: var(--text-dim); font-size: 13px; cursor: pointer;
    padding: 8px 0; font-family: inherit; margin-top: 14px;
  }
  .btn-ghost:hover { color: var(--gold); }

  /* ── PLATFORM CHIPS ── */
  .chip-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-family: inherit; transition: all .2s;
    border: 1px solid #ffffff11; background: transparent; color: #555;
    display: flex; align-items: center; gap: 6px;
  }
  .chip.active-fb  { border-color: var(--fb);  background: #1877F211; color: var(--fb);  }
  .chip.active-ig  { border-color: var(--ig);  background: #E1306C11; color: var(--ig);  }
  .chip.active-tg  { border-color: var(--tg);  background: #29B6D811; color: var(--tg);  }
  .chip.active-tt  { border-color: var(--tt);  background: #EE1D5211; color: var(--tt);  }
  .chip.active-yt  { border-color: var(--yt);  background: #FF000011; color: var(--yt);  }
  .chip .manual-tag { font-size: 10px; opacity: .6; }

  /* ── SUGGESTIONS ── */
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .sug-chip {
    padding: 4px 12px; border-radius: 20px; font-size: 12px;
    background: transparent; border: 1px solid var(--gold-dim);
    color: #C9A84C77; cursor: pointer; font-family: inherit;
    transition: all .2s;
  }
  .sug-chip:hover { border-color: var(--gold); color: var(--gold); }

  /* ── GUIDE BOX ── */
  .guide-box {
    background: #C9A84C0D; border: 1px solid var(--gold-dim);
    border-radius: 10px; padding: 16px; margin-bottom: 24px; font-size: 12px;
  }
  .guide-box .gtitle { color: var(--gold); font-weight: 700; margin-bottom: 10px; }
  .guide-row { display: flex; gap: 8px; margin-bottom: 6px; }
  .guide-key { color: var(--gold); min-width: 130px; }
  .guide-val { color: var(--text-dim); }

  /* ── TABS ── */
  .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .tab {
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-family: inherit; transition: all .2s;
    border: 1px solid #ffffff11; background: transparent; color: #555;
    display: flex; align-items: center; gap: 7px;
  }
  .tab.active-fb  { border-color: var(--fb);  background: #1877F211; color: var(--fb);  }
  .tab.active-ig  { border-color: var(--ig);  background: #E1306C11; color: var(--ig);  }
  .tab.active-tg  { border-color: var(--tg);  background: #29B6D811; color: var(--tg);  }
  .tab.active-tt  { border-color: var(--tt);  background: #EE1D5211; color: var(--tt);  }
  .tab.active-yt  { border-color: var(--yt);  background: #FF000011; color: var(--yt);  }

  /* ── POST CARD ── */
  .post-card {
    background: var(--bg2); border-radius: 12px;
    overflow: hidden; margin-bottom: 20px;
    border: 1px solid var(--gold-dim);
  }
  .post-img {
    width: 100%; height: 180px; object-fit: cover; display: block;
  }
  .post-img-placeholder {
    height: 60px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #333;
  }
  .post-img-loading {
    height: 120px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 12px; color: #555;
  }
  .post-body { padding: 18px; }
  .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .post-title { color: var(--gold-light); font-weight: 700; font-size: 15px; flex: 1; margin-right: 10px; }
  .post-content {
    background: var(--bg); border-radius: 8px; padding: 14px;
    font-size: 13px; color: #C4B89A; line-height: 1.8;
    white-space: pre-wrap; max-height: 220px; overflow-y: auto;
    margin-bottom: 12px;
  }
  .post-status { font-size: 13px; margin-top: 8px; }
  .post-status.success { color: var(--green); }
  .post-status.error   { color: var(--red); }
  .manual-notice {
    background: #C9A84C0D; border: 1px solid var(--gold-dim);
    border-radius: 8px; padding: 10px 12px;
    font-size: 12px; color: var(--gold);
  }

  /* ── STATUS DOT ── */
  .sdot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; flex-shrink: 0;
  }
  .sdot.idle    { background: #444; }
  .sdot.loading { background: var(--gold); animation: pulse 1s ease infinite; box-shadow: 0 0 6px var(--gold); }
  .sdot.success { background: var(--green); }
  .sdot.error   { background: var(--red); }

  /* ── COPY BTN ── */
  .copy-btn {
    background: transparent; border: 1px solid #ffffff22;
    color: var(--text-dim); padding: 3px 10px;
    border-radius: 6px; font-size: 11px; cursor: pointer;
    font-family: inherit; transition: all .2s; white-space: nowrap;
  }
  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); background: #2ecc7111; }

  /* ── PUBLISH BTN ── */
  .btn-publish {
    width: 100%; padding: 14px; border-radius: 10px;
    background: linear-gradient(135deg, #1a6b3a, var(--green));
    border: none; color: #fff; font-size: 14px;
    font-weight: 700; cursor: pointer; letter-spacing: 1px;
    font-family: inherit; transition: opacity .2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-publish:hover { opacity: .9; }
  .btn-publish:disabled { background: #2ecc7122; color: #2ecc7144; cursor: not-allowed; }

  /* ── SPINNER ── */
  .spinner {
    border: 2px solid #C9A84C22; border-top-color: var(--gold);
    border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block; flex-shrink: 0;
  }

  /* ── RESULT PANEL ── */
  .result-hero { text-align: center; margin-bottom: 28px; }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-title { color: var(--gold-light); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .result-sub { color: var(--text-dim); font-size: 13px; }
  .result-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg2); border-radius: 10px;
    padding: 12px 16px; margin-bottom: 10px;
    border: 1px solid #ffffff0D;
  }
  .result-row.success { border-color: #2ecc7122; }
  .result-row.error   { border-color: #e74c3c22; }
  .result-picon { font-size: 18px; }
  .result-pname { flex: 1; font-size: 14px; }
  .tag {
    padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }

  /* ── SETTINGS FAB ── */
  #fab {
    position: fixed; bottom: 24px; right: 24px;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--bg2); border: 1px solid var(--gold-dim);
    color: var(--gold); font-size: 18px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    transition: all .2s; z-index: 200;
  }
  #fab:hover { background: var(--gold-dim); }
  #fab.visible { display: flex; }

  /* section spacing */
  .section { margin-bottom: 26px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo-box">冠</div>
      <div>
        <div class="logo-title">冠尊自动发布系统</div>
        <div class="logo-sub">AUTO PUBLISH ENGINE</div>
      </div>
    </div>
    <div class="steps" id="stepsEl"></div>
  </div>
</div>

<!-- BODY -->
<div id="body"></div>

<!-- FAB -->
<button id="fab" onclick="goStep(0)" title="设置">⚙</button>

<script>
// ── STATE ────────────────────────────────────────────────────────────────────
const PLATFORMS = [
  { id:'facebook',  label:'Facebook',  icon:'📘', color:'#1877F2', auto:true  },
  { id:'instagram', label:'Instagram', icon:'📸', color:'#E1306C', auto:true  },
  { id:'telegram',  label:'Telegram',  icon:'✈️',  color:'#29B6D8', auto:true  },
  { id:'tiktok',    label:'TikTok',    icon:'🎵', color:'#EE1D52', auto:false },
  { id:'youtube',   label:'YouTube',   icon:'▶️',  color:'#FF0000', auto:false },
];
const STEPS = ['设置','主题','预览','完成'];
const SUGGESTIONS = [
  '生肖属鼠的人取名禁忌',
  '数字7代表什么性格？',
  '名字影响孩子运势的3个原因',
  '五行缺木的人适合什么名字',
  '数字易学入门：认识你的主性格数',
  '生肖属虎取名最忌讳哪些字根',
];

let state = {
  step: 0,
  config: {},
  topic: '',
  selectedPlatforms: ['facebook','instagram','telegram','tiktok','youtube'],
  posts: {},
  images: {},
  imageLoading: {},
  generating: false,
  publishing: false,
  publishResults: {},
  activeTab: 0,
};

// Load config
try {
  const saved = localStorage.getItem('gzAutoConfig');
  if (saved) {
    state.config = JSON.parse(saved);
    if (state.config.fbToken && state.config.igId && state.config.tgToken && state.config.tgChatId)
      state.step = 1;
  }
} catch(e){}

// ── RENDER ENGINE ────────────────────────────────────────────────────────────
function render() {
  renderSteps();
  const body = document.getElementById('body');
  const fab  = document.getElementById('fab');
  fab.className = state.step > 0 ? 'visible' : '';

  if      (state.step === 0) body.innerHTML = setupHTML();
  else if (state.step === 1) body.innerHTML = topicHTML();
  else if (state.step === 2) body.innerHTML = generateHTML();
  else if (state.step === 3) body.innerHTML = resultsHTML();

  bindEvents();
}

function renderSteps() {
  const el = document.getElementById('stepsEl');
  el.innerHTML = STEPS.map((s,i) => {
    let cls = i === state.step ? 'active' : i < state.step ? 'done' : '';
    let lbl = i < state.step ? '✓' : i+1;
    let line = i < STEPS.length-1
      ? `<div class="step-line ${i < state.step ? 'done':''}"></div>` : '';
    return `<div class="step-dot ${cls}">${lbl}</div>${line}`;
  }).join('');
}

// ── SETUP ─────────────────────────────────────────────────────────────────────
function setupHTML() {
  const c = state.config;
  const fields = [
    { key:'fbToken',  label:'Facebook Access Token',      type:'password', hint:'Meta for Developers → Graph API Explorer' },
    { key:'igId',     label:'Instagram Business Account ID', type:'text',  hint:'Meta Business Suite → 设置 → Instagram → 账号ID' },
    { key:'tgToken',  label:'Telegram Bot Token',         type:'password', hint:'在Telegram搜索 @BotFather → /newbot' },
    { key:'tgChatId', label:'Telegram Chat / Channel ID', type:'text',     hint:'把Bot加入频道，发消息给 @userinfobot 取得' },
    { key:'pexelsKey',label:'Pexels API Key（免费配图）', type:'password', hint:'pexels.com/api 免费注册，约1分钟' },
  ];
  return `<div class="panel">
    <div class="section">
      <div style="color:var(--gold-light);font-size:18px;font-weight:700;margin-bottom:6px">一次性设置</div>
      <div style="color:var(--text-dim);font-size:13px">填入 API 密钥，存在浏览器本地，之后无需重复</div>
    </div>
    ${fields.map(f=>`
    <div class="field">
      <label class="label">${f.label}</label>
      <input type="${f.type}" id="cfg_${f.key}" value="${c[f.key]||''}" placeholder="${f.hint}" oninput="updateConfig('${f.key}',this.value)">
      <div class="hint">📌 ${f.hint}</div>
    </div>`).join('')}
    <div class="guide-box">
      <div class="gtitle">📖 快速获取指南</div>
      ${[
        ['Facebook Token','developers.facebook.com → Graph API Explorer → 生成Token'],
        ['Instagram ID','Meta Business Suite → 设置 → Instagram → 账号ID'],
        ['Telegram Bot','Telegram搜索 @BotFather → /newbot → 复制Token'],
        ['Pexels Key','pexels.com/api → 免费注册 → 复制API Key'],
      ].map(([k,v])=>`<div class="guide-row"><span class="guide-key">${k}</span><span class="guide-val">${v}</span></div>`).join('')}
    </div>
    <button class="btn-gold" id="setupNext" onclick="saveAndNext()">✦ 保存并继续</button>
  </div>`;
}

function updateConfig(key, val) {
  state.config[key] = val;
  checkSetupBtn();
}
function checkSetupBtn() {
  const btn = document.getElementById('setupNext');
  if (!btn) return;
  const c = state.config;
  const ok = c.fbToken && c.igId && c.tgToken && c.tgChatId;
  btn.disabled = !ok;
  btn.textContent = ok ? '✦ 保存并继续' : '请填写必填项（Pexels 可选）';
}
function saveAndNext() {
  try { localStorage.setItem('gzAutoConfig', JSON.stringify(state.config)); } catch(e){}
  goStep(1);
}

// ── TOPIC ─────────────────────────────────────────────────────────────────────
function topicHTML() {
  return `<div class="panel">
    <div class="section">
      <div style="color:var(--gold-light);font-size:18px;font-weight:700;margin-bottom:6px">输入发布主题</div>
      <div style="color:var(--text-dim);font-size:13px">AI 将为每个平台生成专属文案 + 自动配图</div>
    </div>
    <div class="field">
      <textarea id="topicInput" rows="3" placeholder="例：生肖属鼠的人取名要注意什么？">${state.topic}</textarea>
      <div class="suggestions">
        ${SUGGESTIONS.map(s=>`<button class="sug-chip" onclick="setSuggestion('${s}')">${s}</button>`).join('')}
      </div>
    </div>
    <div class="section">
      <label class="label">目标平台</label>
      <div class="chip-wrap">
        ${PLATFORMS.map(p=>{
          const on = state.selectedPlatforms.includes(p.id);
          return `<button class="chip ${on?'active-'+p.id:''}" onclick="togglePlatform('${p.id}')">
            ${p.icon} ${p.label} ${!p.auto?'<span class="manual-tag">(手动)</span>':''}
          </button>`;
        }).join('')}
      </div>
    </div>
    <button class="btn-gold" id="genBtn" onclick="generateContent()" ${state.generating?'disabled':''}>
      ${state.generating
        ? `<span style="display:flex;align-items:center;justify-content:center;gap:10px"><span class="spinner" style="width:18px;height:18px"></span> AI 生成中...</span>`
        : '✦ 生成内容'}
    </button>
    <button class="btn-ghost" onclick="goStep(0)">← 返回设置</button>
  </div>`;
}

function setSuggestion(s) { state.topic = s; render(); }
function togglePlatform(id) {
  const idx = state.selectedPlatforms.indexOf(id);
  if (idx > -1) state.selectedPlatforms.splice(idx,1);
  else state.selectedPlatforms.push(id);
  render();
}

// ── GENERATE ──────────────────────────────────────────────────────────────────
async function generateContent() {
  const t = document.getElementById('topicInput')?.value?.trim();
  if (!t || state.selectedPlatforms.length === 0) return;
  state.topic = t;
  state.generating = true;
  state.posts = {}; state.images = {};
  render();

  const platformList = state.selectedPlatforms.map(id=>PLATFORMS.find(p=>p.id===id)?.label).join(', ');
  const prompt = `你是黄冠尊老师（马来西亚著名命理师，专精生肖姓名学和数字易学）的社交媒体助手。

主题：${t}
平台：${platformList}

请为每个平台生成专属内容。要求：
- 马来西亚华语，口语化但专业
- Facebook：800-1200字，故事性，互动式结尾，含表情符号
- Instagram：150-200字，精简有力，10-15个hashtags（中英混合）
- Telegram：300-500字，直接实用，含行动呼吁加入WhatsApp群
- TikTok：100-150字口语脚本，开头3秒要抓眼球
- YouTube：300字视频描述，含SEO关键词

每个平台末尾自然提及：加入WhatsApp群 https://chat.whatsapp.com/ILxWi7qf61LAReWxlCc694 或 数字易学3天课程RM490。

另外给我一个英文Pexels搜索关键词（3词以内），适合此内容配图。

只返回JSON，格式：
{"facebook":{"title":"","content":""},"instagram":{"title":"","content":""},"telegram":{"title":"","content":""},"tiktok":{"title":"","content":""},"youtube":{"title":"","content":""},"imageKeyword":"chinese numerology"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text||'';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    state.selectedPlatforms.forEach(id=>{ if(parsed[id]) state.posts[id]=parsed[id]; });

    if (state.config.pexelsKey && parsed.imageKeyword)
      fetchImages(parsed.imageKeyword); // non-blocking

    state.generating = false;
    state.activeTab = 0;
    goStep(2);
  } catch(e) {
    state.generating = false;
    render();
    alert('内容生成失败，请检查网络后重试。');
  }
}

async function fetchImages(keyword) {
  const loading = {};
  state.selectedPlatforms.forEach(id=>loading[id]=true);
  state.imageLoading = loading;
  try { renderImageLoadingState(); } catch(e){}

  try {
    const res = await fetch(`https://api.pexels.com/v1/search?query=${encodeURIComponent(keyword)}&per_page=5&orientation=landscape`,{
      headers:{Authorization:state.config.pexelsKey}
    });
    const data = await res.json();
    const photos = data.photos||[];
    state.selectedPlatforms.forEach((id,i)=>{
      if(photos[i%photos.length]) state.images[id]={
        src:photos[i%photos.length].src.large,
        alt:photos[i%photos.length].alt
      };
    });
  } catch(e){}

  state.imageLoading = {};
  if (state.step === 2) render();
}

function renderImageLoadingState() {
  state.selectedPlatforms.forEach(id=>{
    const el = document.getElementById('img_'+id);
    if(el) el.innerHTML = `<div class="post-img-loading"><span class="spinner" style="width:20px;height:20px"></span><span>搜索配图中...</span></div>`;
  });
}

// ── PREVIEW ───────────────────────────────────────────────────────────────────
function generateHTML() {
  const platforms = PLATFORMS.filter(p=>state.selectedPlatforms.includes(p.id));
  const active = platforms[state.activeTab] || platforms[0];
  const post = active ? state.posts[active.id] : null;
  const img  = active ? state.images[active.id] : null;
  const imgLoading = active ? state.imageLoading[active.id] : false;
  const result = active ? state.publishResults[active.id] : null;

  return `<div class="panel">
    <div class="section">
      <div style="color:var(--gold-light);font-size:18px;font-weight:700;margin-bottom:6px">预览 & 发布</div>
      <div style="color:var(--text-dim);font-size:13px">检查内容，确认后一键发布</div>
    </div>

    <div class="tabs">
      ${platforms.map((p,i)=>{
        const r = state.publishResults[p.id];
        const isActive = i===state.activeTab;
        return `<button class="tab ${isActive?'active-'+p.id:''}" onclick="switchTab(${i})">
          <span class="sdot ${r||'idle'}"></span>
          ${p.icon} ${p.label}
        </button>`;
      }).join('')}
    </div>

    ${active && post ? `
    <div class="post-card" style="border-color:${active.color}33">
      <div id="img_${active.id}">
        ${imgLoading
          ? `<div class="post-img-loading"><span class="spinner" style="width:20px;height:20px"></span><span>搜索配图中...</span></div>`
          : img
            ? `<div style="position:relative"><img class="post-img" src="${img.src}" alt="${img.alt||''}"><div style="position:absolute;bottom:8px;right:8px;background:#00000088;border-radius:4px;padding:2px 8px;font-size:10px;color:#ffffff88">📷 Pexels</div></div>`
            : `<div class="post-img-placeholder">无配图（未设置 Pexels Key）</div>`
        }
      </div>
      <div class="post-body">
        <div class="post-header">
          <div class="post-title">${post.title}</div>
          <button class="copy-btn" id="copyBtn_${active.id}" onclick="copyPost('${active.id}')">复制</button>
        </div>
        <div class="post-content">${escHtml(post.content)}</div>
        ${result==='success' ? `<div class="post-status success">✅ 已成功发布到 ${active.label}</div>` : ''}
        ${result==='error'   ? `<div class="post-status error">❌ 发布失败（检查 Token 是否正确）</div>` : ''}
        ${!active.auto ? `<div class="manual-notice">⚠️ ${active.label} 需手动发布 — 文案已生成，复制后粘贴即可</div>` : ''}
      </div>
    </div>` : `<div style="color:var(--text-dim);font-size:13px;padding:20px 0">暂无内容</div>`}

    <button class="btn-publish" id="pubBtn" onclick="publishAll()" ${state.publishing?'disabled':''}>
      ${state.publishing
        ? `<span class="spinner" style="width:18px;height:18px;border-color:#2ecc7122;border-top-color:#2ecc7144"></span> 发布中...`
        : '🚀 一键发布所有平台'}
    </button>
    <button class="btn-ghost" onclick="goStep(1)">← 修改主题</button>
  </div>`;
}

function switchTab(i) { state.activeTab = i; render(); }

function copyPost(id) {
  const post = state.posts[id];
  if (!post) return;
  navigator.clipboard.writeText(post.title+'\n\n'+post.content);
  const btn = document.getElementById('copyBtn_'+id);
  if(btn){ btn.textContent='✓ 已复制'; btn.className='copy-btn copied'; }
  setTimeout(()=>{ const b=document.getElementById('copyBtn_'+id); if(b){b.textContent='复制';b.className='copy-btn';} },2000);
}

// ── PUBLISH ───────────────────────────────────────────────────────────────────
async function publishAll() {
  state.publishing = true;
  render();

  for (const pid of state.selectedPlatforms) {
    const platform = PLATFORMS.find(p=>p.id===pid);
    if (!platform?.auto) continue;
    const post = state.posts[pid];
    if (!post) continue;

    state.publishResults[pid] = 'loading';
    render();

    const text = post.title+'\n\n'+post.content;
    try {
      if (pid==='facebook')  await publishFacebook(text);
      if (pid==='instagram') await publishInstagram(text);
      if (pid==='telegram')  await publishTelegram(text);
      state.publishResults[pid] = 'success';
    } catch(e) {
      state.publishResults[pid] = 'error';
      console.error(pid, e);
    }
    render();
    await sleep(400);
  }

  state.publishing = false;
  goStep(3);
}

async function publishFacebook(message) {
  const imgUrl = state.images['facebook']?.src;
  if (imgUrl) {
    const fd = new FormData();
    fd.append('url', imgUrl);
    fd.append('caption', message);
    fd.append('access_token', state.config.fbToken);
    const res = await fetch('https://graph.facebook.com/v19.0/me/photos',{method:'POST',body:fd});
    const d = await res.json();
    if(d.error) throw new Error(d.error.message);
  } else {
    const res = await fetch('https://graph.facebook.com/v19.0/me/feed',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message, access_token:state.config.fbToken})
    });
    const d = await res.json();
    if(d.error) throw new Error(d.error.message);
  }
}

async function publishInstagram(caption) {
  const imgUrl = state.images['instagram']?.src || 'https://images.pexels.com/photos/4101143/pexels-photo-4101143.jpeg';
  const r1 = await fetch(`https://graph.facebook.com/v19.0/${state.config.igId}/media`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({image_url:imgUrl, caption, access_token:state.config.fbToken})
  });
  const d1 = await r1.json();
  if(d1.error) throw new Error(d1.error.message);
  const r2 = await fetch(`https://graph.facebook.com/v19.0/${state.config.igId}/media_publish`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({creation_id:d1.id, access_token:state.config.fbToken})
  });
  const d2 = await r2.json();
  if(d2.error) throw new Error(d2.error.message);
}

async function publishTelegram(text) {
  if (state.images['telegram']?.src) {
    const res = await fetch(`https://api.telegram.org/bot${state.config.tgToken}/sendPhoto`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:state.config.tgChatId, photo:state.images['telegram'].src, caption:text})
    });
    const d = await res.json();
    if(!d.ok) throw new Error(d.description);
    return;
  }
  const res = await fetch(`https://api.telegram.org/bot${state.config.tgToken}/sendMessage`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:state.config.tgChatId, text, parse_mode:'HTML'})
  });
  const d = await res.json();
  if(!d.ok) throw new Error(d.description);
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function resultsHTML() {
  const platforms = PLATFORMS.filter(p=>state.selectedPlatforms.includes(p.id));
  const autoPlatforms = platforms.filter(p=>p.auto);
  const successCount = autoPlatforms.filter(p=>state.publishResults[p.id]==='success').length;
  const allOk = successCount === autoPlatforms.length;

  return `<div class="panel">
    <div class="result-hero">
      <div class="result-emoji">${allOk?'🎉':'⚠️'}</div>
      <div class="result-title">${allOk?'发布完成！':`${successCount}/${autoPlatforms.length} 平台发布成功`}</div>
      <div class="result-sub">内容已自动发布</div>
    </div>
    <div style="margin-bottom:28px">
      ${platforms.map(p=>{
        const r = state.publishResults[p.id];
        let tag='', rowCls='';
        if(r==='success')   { tag=`<span class="tag" style="background:#2ecc7122;border:1px solid #2ecc7144;color:var(--green)">✅ 已发布</span>`; rowCls='success'; }
        else if(r==='error'){ tag=`<span class="tag" style="background:#e74c3c22;border:1px solid #e74c3c44;color:var(--red)">❌ 失败</span>`; rowCls='error'; }
        else if(!p.auto)    { tag=`<span class="tag" style="background:#C9A84C22;border:1px solid #C9A84C44;color:var(--gold)">📋 手动复制</span>`; }
        else                { tag=`<span class="tag" style="background:#44444422;border:1px solid #44444444;color:#555">跳过</span>`; }
        return `<div class="result-row ${rowCls}">
          <span class="result-picon">${p.icon}</span>
          <span class="result-pname">${p.label}</span>
          ${tag}
        </div>`;
      }).join('')}
    </div>
    <button class="btn-gold" onclick="resetPublish()">✦ 发布新内容</button>
  </div>`;
}

function resetPublish() {
  state.topic=''; state.posts={}; state.images={};
  state.publishResults={}; state.activeTab=0;
  goStep(1);
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function goStep(n) { state.step=n; render(); window.scrollTo(0,0); }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
function escHtml(s) {
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function bindEvents() {
  // live topic sync
  const ti = document.getElementById('topicInput');
  if(ti) ti.addEventListener('input', e=>state.topic=e.target.value);
  // check setup btn state
  checkSetupBtn();
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
